<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeug | Inhofer Flotte</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root {
  --bg: #f8fafc;
  --card: white;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #2563eb;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --card: #1e2937;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #3b82f6;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s;
}

.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 78px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.brand {
  font-size: 23px;
  font-weight: 900;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--primary);
}

.main {
  display: grid;
  grid-template-columns: 360px 1fr 420px;
  gap: 28px;
  padding: 32px;
  max-width: 1750px;
  margin: 0 auto;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 10px 30px rgba(15,23,42,0.06);
}

.viewer {
  height: 480px;
  background: #1e2937;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #64748b;
  font-size: 18px;
  position: relative;
}

.btn {
  padding: 14px 24px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  font-size: 15px;
}

.primary-btn {
  background: var(--primary);
  color: white;
  width: 100%;
}

.switch {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">🚐 Inhofer Flottenmanagement</div>
  <div style="display:flex; gap:16px; align-items:center">
    <span id="userInfo"></span>
    <button onclick="toggleTheme()" class="switch">🌙 / ☀️</button>
    <button onclick="logout()" style="background:#ef4444;color:white" class="btn">Logout</button>
  </div>
</div>

<div class="main">

  <!-- Fahrzeug Info -->
  <div>
    <div class="card">
      <h2 id="vehicleTitle">Fahrzeug</h2>
      <p id="plate" style="color:var(--muted);margin:6px 0 20px 0"></p>
      <label>Status</label>
      <select id="status" class="btn" style="width:100%;background:var(--card);color:var(--text)" onchange="saveStatus()"></select>
    </div>
  </div>

  <!-- Großer Viewer -->
  <div>
    <div class="card viewer" id="viewer">
      <div>Fahrzeugansicht (Vorne / Seite / Hinten)</div>
    </div>

    <div class="card" style="margin-top:24px">
      <h3>Schaden melden</h3>
      <input id="damageType" placeholder="Schadenart (z.B. Kratzer)" style="width:100%;padding:14px;margin:12px 0;border:1px solid var(--border);border-radius:12px">
      <input id="damageArea" placeholder="Bereich" style="width:100%;padding:14px;margin:12px 0;border:1px solid var(--border);border-radius:12px">
      <textarea id="description" placeholder="Beschreibung..." rows="4" style="width:100%;padding:14px;margin:12px 0;border:1px solid var(--border);border-radius:12px"></textarea>
      
      <input type="file" id="images" multiple style="margin:12px 0">
      <button onclick="saveDamage()" class="primary-btn btn">Schaden speichern</button>
    </div>
  </div>

  <!-- Rechte Spalte -->
  <div class="card">
    <h3>Aktive Schäden</h3>
    <div id="damageList"></div>
  </div>
</div>

<script>
const db = window.supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

async function logout() {
  await db.auth.signOut();
  location.href = "login.html";
}

function toggleTheme() {
  const theme = document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.body.setAttribute("data-theme", theme);
}

async function init() {
  const {data} = await db.auth.getSession();
  if (!data.session) return location.href = "login.html";

  const emp = (await db.from("employees").select("*").eq("email", data.session.user.email).maybeSingle()).data;
  document.getElementById("userInfo").innerHTML = `${emp?.name || 'Mitarbeiter'} <small>(${emp?.role})</small>`;
}

init();
</script>
</body>
</html>
