<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugdetails</title>

<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #1e40af;
}

[data-theme="dark"] {
  --bg: #0a0f1c;
  --surface: #121a2e;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar { background:var(--surface); height:88px; padding:0 50px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }

.brand { font-size:27px; font-weight:900; color:var(--primary); display:flex; align-items:center; gap:12px; }

.main-grid {
  display: grid;
  grid-template-columns: 340px 1fr 380px;
  gap: 28px;
  padding: 40px 50px;
  max-width: 1700px;
  margin: 0 auto;
}

.card {
  background:var(--surface);
  border-radius:20px;
  border:1px solid var(--border);
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.viewer {
  height:460px;
  background:#1e2937;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.viewer img {
  max-height:100%;
  max-width:100%;
  object-fit:contain;
}

.view-buttons {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:16px;
}

.view-btn {
  padding:8px 18px;
  border-radius:999px;
  background:var(--surface);
  border:1px solid var(--border);
  cursor:pointer;
  font-size:14px;
}

.view-btn.active {
  background:var(--primary);
  color:white;
  border-color:var(--primary);
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">🚐 Schadendokumentation Mietfahrzeuge</div>
  <div id="userBox" style="display:flex;align-items:center;gap:12px"></div>
</div>

<div class="main-grid">

  <!-- Links: Schaden hinzufügen -->
  <div class="card">
    <h3>Schaden hinzufügen</h3>
    <!-- Dein Schadensformular (kannst du später erweitern) -->
    <button onclick="saveDamage()" style="width:100%;margin-top:24px;padding:16px;background:var(--primary);color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer">
      Schaden speichern
    </button>
  </div>

  <!-- Mitte: 360° Ansicht + Buttons -->
  <div class="card">
    <h3>360° Ansicht</h3>
    <div class="viewer" id="viewer">
      <img id="vehicleImage" src="" alt="Fahrzeug">
    </div>
    <div class="view-buttons" id="viewButtons"></div>
  </div>

  <!-- Rechts: Aktive Schäden -->
  <div class="card">
    <h3>Aktive Schäden (<span id="damageCount">0</span>)</h3>
    <div id="damageList" style="margin-top:16px"></div>
  </div>
</div>

<script>

// === DEINE BILDER HIER (Pfad zu deinem GitHub-Ordner) ===

function renderViewButtons() {
  const container = document.getElementById("viewButtons");
  container.innerHTML = vehicleViews.map((view, i) => `

}

function setView(index) {
  currentView = index;
  document.getElementById("vehicleImage").src = vehicleViews[index].url;
  renderViewButtons();
}

</html>
