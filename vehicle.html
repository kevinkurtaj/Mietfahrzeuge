<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugdetails</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #1e40af;
}

[data-theme="dark"] {
  --bg: #0a0f1c;
  --surface: #121a2e;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--surface); height:88px; padding:0 50px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
}

.brand { font-size:29px; font-weight:900; color:var(--primary); display:flex; align-items:center; gap:12px; }

.sidebar {
  width: 280px; background:var(--surface); height:calc(100vh - 88px); border-right:1px solid var(--border); padding:32px 24px; position:fixed; display:flex; flex-direction:column;
}

.nav-item {
  padding:16px 20px; border-radius:16px; margin-bottom:8px; cursor:pointer; font-weight:500;
}

.nav-item.active { background:var(--primary); color:white; }

.main { margin-left:280px; padding:50px 60px; }

.card {
  background:var(--surface); 
  border-radius:24px; 
  padding:36px; 
  border:1px solid var(--border);
  box-shadow:0 10px 35px rgba(0,0,0,0.07);
}

.viewer {
  height:460px; 
  background:#1e2937; 
  border-radius:20px; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  color:#94a3b8; 
  font-size:18px;
}

.upload-box {
  border:2px dashed var(--border); 
  border-radius:16px; 
  padding:40px 20px; 
  text-align:center; 
  cursor:pointer;
}

.upload-box:hover { background:rgba(30,64,175,0.05); }
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">🚐 Inhofer Flottenmanagement</div>
  <div id="userBox" style="display:flex;align-items:center;gap:12px"></div>
</div>

<div style="display:flex">
  <div class="sidebar">
    <div onclick="location.href='index.html'" class="nav-item">🚘 Fahrzeuge</div>
    <div onclick="location.href='history.html'" class="nav-item">🕒 Historie</div>
    <div id="adminLink" onclick="location.href='admin.html'" class="nav-item" style="display:none;">👤 Admin Panel</div>
    <button onclick="logout()" class="logout-btn" style="margin-top:auto;padding:14px 24px;background:#ef4444;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">↩ Logout</button>
  </div>

  <div class="main">
    <h1 id="vehicleTitle" style="font-size:37px;margin-bottom:8px">Fahrzeug laden...</h1>
    <p id="plate" style="color:var(--muted);font-size:18px"></p>

    <!-- Fahrzeug Status -->
    <div class="card" style="margin-top:20px">
      <h3>Fahrzeug-Status</h3>
      <select id="vehicleStatus" onchange="saveVehicleStatus()" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px;font-size:16px">
        <option value="einsatzbereit">Einsatzbereit</option>
        <option value="in wartung">In Wartung</option>
        <option value="nicht verfügbar">Nicht verfügbar</option>
      </select>
    </div>

    <!-- 360° Viewer -->
    <div class="card" style="margin-top:30px">
      <h3>360° Ansicht</h3>
      <div class="viewer" id="viewer">
        Fahrzeugbild wird geladen...
      </div>
    </div>

    <!-- Schadensformular -->
    <div class="card" style="margin-top:30px">
      <h3>Neuen Schaden melden</h3>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
        <div>
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Schadenart</label>
          <input id="damageType" placeholder="z.B. Kratzer, Delle" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
        </div>
        <div>
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Bereich</label>
          <input id="damageArea" placeholder="z.B. vorne-links" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
        </div>
      </div>

      <div style="margin-top:20px">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Schweregrad</label>
        <select id="severity" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
          <option value="leicht">🟢 Leicht</option>
          <option value="mittel">🟠 Mittel</option>
          <option value="schwer">🔴 Schwer</option>
        </select>
      </div>

      <div style="margin-top:20px">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Beschreibung</label>
        <textarea id="description" rows="4" placeholder="Genauere Beschreibung..." style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px"></textarea>
      </div>

      <div style="margin-top:24px">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Bilder hochladen</label>
        <div class="upload-box" onclick="document.getElementById('images').click()">
          📸 Bilder auswählen oder hierher ziehen<br>
          <small style="color:var(--muted)">max. 8 MB pro Bild • JPG, PNG, WebP</small>
        </div>
        <input type="file" id="images" multiple accept="image/*" style="display:none">
      </div>

      <button onclick="saveDamage()" style="width:100%;padding:16px;background:var(--primary);color:white;border:none;border-radius:12px;font-weight:700;margin-top:24px;cursor:pointer">
        Schaden + Bilder speichern
      </button>
    </div>

    <!-- Aktive Schäden -->
    <div class="card" style="margin-top:30px">
      <h3>Aktive Schäden (<span id="damageCount">0</span>)</h3>
      <div id="damageList" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<script>
const db = window.supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

let vehicleId = new URLSearchParams(location.search).get("id");

function toggleTheme() {
  const isDark = document.body.getAttribute("data-theme") === "dark";
  document.body.setAttribute("data-theme", isDark ? "light" : "dark");
  localStorage.setItem("theme", isDark ? "light" : "dark");
}

async function loadUser() {
  const {data} = await db.auth.getSession();
  if (!data.session) return location.href = "login.html";

  const user = data.session.user;
  const {data: emp} = await db.from("employees").select("name,role").eq("email", user.email).maybeSingle();

  const name = emp?.name || user.email.split('@')[0];
  const role = emp?.role || "mitarbeiter";

  const roleHTML = role === "admin" 
    ? `<span style="background:#fee2e2;color:#991b1b;padding:6px 18px;border-radius:999px;font-size:13px">Admin</span>` 
    : `<span style="background:#dcfce7;color:#166534;padding:6px 18px;border-radius:999px;font-size:13px">Mitarbeiter</span>`;

  document.getElementById("userBox").innerHTML = `<strong>${name}</strong> ${roleHTML}`;

  if (role === "admin") document.getElementById("adminLink").style.display = "block";
}

async function loadVehicle() {
  const {data} = await db.from("vehicles").select("*").eq("id", vehicleId).maybeSingle();
  if (data) {
    document.getElementById("vehicleTitle").textContent = data.name || "Fahrzeug";
    document.getElementById("plate").textContent = data.kennzeichen ? "Kennzeichen: " + data.kennzeichen : "";
    document.getElementById("vehicleStatus").value = data.status || "einsatzbereit";
  }
}

async function saveVehicleStatus() {
  const status = document.getElementById("vehicleStatus").value;
  await db.from("vehicles").update({status}).eq("id", vehicleId);
  alert("✅ Fahrzeug-Status wurde aktualisiert");
}

async function saveDamage() {
  const damageType = document.getElementById("damageType").value.trim();
  const damageArea = document.getElementById("damageArea").value.trim();
  const severity = document.getElementById("severity").value;
  const description = document.getElementById("description").value.trim();
  const files = document.getElementById("images").files;

  if (!damageType || !damageArea) {
    alert("Bitte Schadenart und Bereich ausfüllen!");
    return;
  }

  let imageUrls = [];

  // Bilder hochladen
  for (let file of files) {
    const fileExt = file.name.split('.').pop().toLowerCase();
    const fileName = `${Date.now()}-${crypto.randomUUID()}.${fileExt}`;
    const filePath = `damages/vehicle-${vehicleId}/${fileName}`;

    const {error} = await db.storage.from('damage-images').upload(filePath, file);
    if (error) {
      console.error(error);
      alert("Fehler beim Bild-Upload");
      return;
    }

    const {data: urlData} = db.storage.from('damage-images').getPublicUrl(filePath);
    imageUrls.push(urlData.publicUrl);
  }

  // Schaden speichern
  const {error} = await db.from("damages").insert([{
    vehicle_id: vehicleId,
    damage_type: damageType,
    area: damageArea,
    severity: severity,
    description: description,
    status: "offen",
    image_urls: imageUrls
  }]);

  if (error) {
    alert("Fehler beim Speichern: " + error.message);
  } else {
    alert("✅ Schaden erfolgreich gespeichert!");
    // Formular zurücksetzen
    document.getElementById("damageType").value = "";
    document.getElementById("damageArea").value = "";
    document.getElementById("description").value = "";
    document.getElementById("images").value = "";
  }
}

async function logout() {
  await db.auth.signOut();
  location.href = "login.html";
}

if (localStorage.getItem("theme") === "dark") document.body.setAttribute("data-theme", "dark");

loadUser();
loadVehicle();
</script>
</body>
</html>
