<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #1e40af;
}

[data-theme="dark"] {
  --bg: #0a0f1c;
  --surface: #121a2e;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--surface); height:86px; padding:0 48px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
}

.brand { font-size:28px; font-weight:900; color:var(--primary); display:flex; align-items:center; gap:12px; }

.sidebar {
  width: 280px; background:var(--surface); height:calc(100vh - 86px); border-right:1px solid var(--border); padding:24px; position:fixed; display:flex; flex-direction:column;
}

.nav-item {
  padding:14px 18px; border-radius:14px; margin-bottom:6px; cursor:pointer; font-weight:500;
}

.nav-item.active { background:var(--primary); color:white; }

.main { margin-left:280px; padding:40px 50px; }

.card {
  background:var(--surface); 
  border-radius:20px; 
  padding:28px; 
  border:1px solid var(--border);
  margin-bottom:24px;
}

.viewer {
  height:420px; 
  background:#1e2937; 
  border-radius:16px; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  color:#94a3b8;
}

.damage-form {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:20px;
}

.damage-list {
  display:grid;
  gap:16px;
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">🚐 Inhofer Flottenmanagement</div>
  <div id="userBox" style="display:flex;align-items:center;gap:12px"></div>
</div>

<div style="display:flex">
  <div class="sidebar">
    <div onclick="location.href='index.html'" class="nav-item active">🚘 Fahrzeuge</div>
    <div onclick="location.href='history.html'" class="nav-item">🕒 Historie</div>
    <div id="adminLink" onclick="location.href='admin.html'" class="nav-item" style="display:none;">👤 Admin Panel</div>
    <button onclick="logout()" style="margin-top:auto;padding:14px 20px;background:#ef4444;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">↩ Logout</button>
  </div>

  <div class="main">
    <h1 id="vehicleTitle" style="font-size:36px;margin-bottom:6px">Fahrzeug laden...</h1>
    <p id="plate" style="color:var(--muted)"></p>

    <!-- Status -->
    <div class="card">
      <h3>Fahrzeug-Status</h3>
      <select id="vehicleStatus" onchange="saveVehicleStatus()" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
        <option value="einsatzbereit">Einsatzbereit</option>
        <option value="in wartung">In Wartung</option>
        <option value="nicht verfügbar">Nicht verfügbar</option>
      </select>
    </div>

    <!-- Viewer -->
    <div class="card">
      <h3>360° Ansicht</h3>
      <div class="viewer" id="viewer">Fahrzeugbild wird geladen...</div>
    </div>

    <!-- Schaden melden - breiter -->
    <div class="card">
      <h3>Neuen Schaden melden</h3>
      <div class="damage-form">
        <div>
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Schadenart</label>
          <input id="damageType" placeholder="z.B. Kratzer, Delle" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
        </div>
        <div>
          <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Bereich</label>
          <input id="damageArea" placeholder="z.B. vorne-links" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
        </div>
      </div>

      <div style="margin-top:20px">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Schweregrad</label>
        <select id="severity" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px">
          <option value="leicht">🟢 Leicht</option>
          <option value="mittel">🟠 Mittel</option>
          <option value="schwer">🔴 Schwer</option>
        </select>
      </div>

      <div style="margin-top:20px">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Beschreibung</label>
        <textarea id="description" rows="3" placeholder="Genauere Beschreibung..." style="width:100%;padding:14px;border:1px solid var(--border);border-radius:12px"></textarea>
      </div>

      <div style="margin-top:24px">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:var(--muted)">Bilder hochladen</label>
        <div onclick="document.getElementById('images').click()" style="border:2px dashed var(--border);border-radius:16px;padding:30px;text-align:center;cursor:pointer;">
          📸 Bilder auswählen oder hierher ziehen
        </div>
        <input type="file" id="images" multiple accept="image/*" style="display:none">
      </div>

      <button onclick="saveDamage()" style="width:100%;padding:16px;background:var(--primary);color:white;border:none;border-radius:12px;font-weight:700;margin-top:24px;cursor:pointer">
        Schaden speichern
      </button>
    </div>

    <!-- Aktive Schäden -->
    <div class="card">
      <h3>Aktive Schäden (<span id="damageCount">0</span>)</h3>
      <div id="damageList" style="margin-top:16px"></div>
    </div>
  </div>
</div>

</html>
