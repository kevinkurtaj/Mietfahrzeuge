<style>
:root{
  --bg:#f6f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --blue:#2563eb;
  --blue2:#3b82f6;
  --green:#16a34a;
  --red:#ef4444;
  --orange:#f59e0b;
  --gray:#64748b;
  --shadow:0 18px 50px rgba(15,23,42,.08);
  --soft-shadow:0 10px 30px rgba(15,23,42,.06);
  --radius:22px;
}
*{box-sizing:border-box;font-family:Inter,Arial,Helvetica,sans-serif}
body{
  margin:0;min-height:100vh;color:var(--text);
  background:radial-gradient(circle at top left,rgba(37,99,235,.08),transparent 32%),linear-gradient(135deg,#f8fafc,#eef2f7);
}
.app-shell{
  max-width:1540px;margin:14px auto;min-height:calc(100vh - 28px);
  background:rgba(255,255,255,.82);border:1px solid rgba(148,163,184,.35);
  border-radius:22px;box-shadow:var(--shadow);overflow:hidden;
}
.topbar{
  height:80px;padding:0 30px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
}
.brand{display:flex;align-items:center;gap:14px;font-size:21px;font-weight:900;letter-spacing:-.3px}
.brand-icon{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;color:var(--blue);border:1px solid #bfdbfe;background:#eff6ff;font-size:24px}
.userbox{display:flex;align-items:center;gap:14px}
.avatar{width:40px;height:40px;border-radius:999px;background:#eef2ff;color:#1d4ed8;font-weight:900;display:grid;place-items:center}
.user-name{font-weight:900}.user-role{color:var(--muted);font-size:13px;margin-top:2px}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 108px)}
.sidebar{border-right:1px solid var(--line);padding:28px 14px;display:flex;flex-direction:column;justify-content:space-between;background:rgba(255,255,255,.55)}
.nav{display:grid;gap:14px}
.nav-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;color:#334155;text-decoration:none;font-weight:800;cursor:pointer;border:none;background:transparent;font-size:15px;text-align:left}
.nav-item.active{background:linear-gradient(135deg,var(--blue),#4f46e5);color:white;box-shadow:0 12px 28px rgba(37,99,235,.28)}
.nav-item:hover:not(.active){background:#f1f5f9}
.content{padding:28px 26px 20px}
.page-head{position:relative;min-height:78px;display:flex;align-items:flex-start;justify-content:center;margin-bottom:24px}
.back-btn{position:absolute;left:0;top:10px;display:inline-flex;align-items:center;gap:8px;border:none;background:transparent;color:#334155;font-weight:800;cursor:pointer;font-size:15px}
.title-wrap{text-align:center}.title-wrap h1{margin:0;font-size:30px;letter-spacing:-.8px}.title-wrap p{margin:8px 0 0;color:var(--muted);font-size:14px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.date-box{position:absolute;right:0;top:4px;display:grid;grid-template-columns:auto 1fr;gap:8px 10px;color:#475569;font-size:14px;align-items:center}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--soft-shadow)}
.panel{padding:18px}
.panel-title{display:flex;align-items:center;gap:10px;margin:0 0 22px;font-size:19px;font-weight:950}
.icon-badge{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:#f8fafc;border:1px solid var(--line)}
label{display:block;font-size:13px;font-weight:900;margin:14px 0 8px}
input,select,textarea{
  width:100%;border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:10px;padding:12px 13px;outline:none;font-size:14px;transition:.16s;
}
textarea{min-height:80px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 4px rgba(37,99,235,.10)}
.primary-btn{border:none;padding:14px 16px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#3b82f6);color:white;font-weight:950;cursor:pointer;box-shadow:0 12px 24px rgba(37,99,235,.24)}
.primary-btn:hover{transform:translateY(-1px)}
.secondary-btn{border:1px solid #bfdbfe;background:#fff;color:var(--blue);border-radius:10px;padding:10px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center;align-items:center}
.success-btn{border:1px solid #bbf7d0;background:#f0fdf4;color:#15803d;border-radius:10px;padding:10px 16px;font-weight:900;cursor:pointer}
.danger-btn{border:1px solid #fecaca;background:#fff;color:#dc2626;border-radius:10px;padding:10px 16px;font-weight:900;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.stat{padding:22px}.stat .label{font-size:13px;color:var(--muted);font-weight:900}.stat strong{display:block;margin-top:8px;font-size:32px}
.badge{display:inline-flex;align-items:center;width:max-content;padding:7px 11px;border-radius:9px;font-size:12px;font-weight:950;background:#e5e7eb;color:#475569}
.badge.einsatzbereit{background:#dcfce7;color:#166534}.badge.werkstatt,.badge.nicht_einsatzbereit{background:#fee2e2;color:#991b1b}.badge.abruf{background:#dbeafe;color:#1d4ed8}.badge.nicht_im_einsatz{background:#e5e7eb;color:#374151}
.severity{padding:7px 12px;border-radius:9px;font-size:12px;font-weight:950}.severity.leicht{background:#dcfce7;color:#166534}.severity.mittel{background:#fef3c7;color:#92400e}.severity.schwer{background:#fee2e2;color:#991b1b}
.toast{position:fixed;right:22px;bottom:22px;background:#0f172a;color:white;padding:14px 18px;border-radius:14px;box-shadow:0 20px 45px rgba(15,23,42,.24);display:none;z-index:50;max-width:420px}.toast.success{background:#166534}.toast.error{background:#991b1b}
.empty-state{padding:28px;text-align:center;color:#64748b;background:#fbfdff;border:1px dashed #cbd5e1;border-radius:16px}
.footer{text-align:center;color:#64748b;font-size:13px;padding:18px 0 10px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:40}
.modal-box{width:100%;max-width:560px;background:white;border-radius:22px;padding:24px;box-shadow:0 25px 70
