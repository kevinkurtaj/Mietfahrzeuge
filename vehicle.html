<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Fahrzeug</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f6f7fb;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #fff;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid #eee;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #f0f2f7;
      cursor: pointer;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr 300px;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .viewer {
      height: 300px;
      background: #f2f4f9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 20px;
    }

    input, select, textarea {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button.primary {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .vehicle-info {
      margin-top: 20px;
      display: flex;
      gap: 20px;
    }

    .info-box {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      flex: 1;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <button onclick="location.href='index.html'">Fahrzeuge</button>
  <button onclick="location.href='history.html'">Historie</button>
  <button id="adminBtn" style="display:none;">Admin Panel</button>
</div>

<div class="main">

  <h2 id="vehicleTitle">Fahrzeug</h2>

  <div class="grid">

    <!-- LEFT -->
    <div class="card">
      <h3>Schaden hinzufügen</h3>

      <input id="damageType" placeholder="z.B. Kratzer">
      <input id="damageArea" placeholder="Bereich">
      
      <select id="damageSeverity">
        <option value="leicht">leicht</option>
        <option value="mittel">mittel</option>
        <option value="schwer">schwer</option>
      </select>

      <textarea id="damageDesc" placeholder="Beschreibung"></textarea>

      <button class="primary" onclick="saveDamage()">Speichern</button>
    </div>

    <!-- CENTER -->
    <div class="card">
      <h3>360° Ansicht</h3>
      <div class="viewer">Sprinter Ansicht</div>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <h3>Aktive Schäden</h3>
      <div id="damageList">Keine Schäden</div>
    </div>

  </div>

  <!-- INFOS -->
  <div class="vehicle-info">

    <div class="info-box">
      <label>Kilometerstand</label>
      <input id="kmInput">
    </div>

    <div class="info-box">
      <label>Erstzulassung</label>
      <input type="date" id="dateInput">
    </div>

    <div class="info-box">
      <button class="primary" onclick="saveVehicleData()">Speichern</button>
    </div>

  </div>

</div>

<script>
const db = supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

const urlParams = new URLSearchParams(window.location.search);
const vehicleId = urlParams.get("id");

async function init() {
  const { data } = await db.auth.getUser();
  if (!data.user) location.href = "login.html";

  const { data: vehicle } = await db
    .from("vehicles")
    .select("*")
    .eq("id", vehicleId)
    .single();

  document.getElementById("vehicleTitle").innerText = vehicle.name;
  document.getElementById("kmInput").value = vehicle.km || "";
  document.getElementById("dateInput").value = vehicle.first_registration || "";

  loadDamages();
}

async function saveDamage() {
  const { data } = await db.auth.getUser();
  const user = data.user;

  const { error } = await db.from("damages").insert({
    vehicle_id: Number(vehicleId),
    damage_type: document.getElementById("damageType").value,
    area: document.getElementById("damageArea").value,
    severity: document.getElementById("damageSeverity").value,
    description: document.getElementById("damageDesc").value,

    // 🔥 WICHTIG (dein Fehler FIX)
    created_by: user.id
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Gespeichert");
  loadDamages();
}

async function loadDamages() {
  const { data } = await db
    .from("damages")
    .select("*")
    .eq("vehicle_id", vehicleId);

  const list = document.getElementById("damageList");
  list.innerHTML = "";

  if (!data.length) {
    list.innerHTML = "Keine Schäden";
    return;
  }

  data.forEach(d => {
    list.innerHTML += `<div>${d.damage_type} (${d.area})</div>`;
  });
}

async function saveVehicleData() {
  await db.from("vehicles").update({
    km: document.getElementById("kmInput").value,
    first_registration: document.getElementById("dateInput").value
  }).eq("id", vehicleId);

  alert("Fahrzeug gespeichert");
}

init();
</script>

</body>
</html>
