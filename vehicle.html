<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugdetails</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #1e40af;
}

[data-theme="dark"] {
  --bg: #0a0f1c;
  --surface: #121a2e;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--surface); height:88px; padding:0 50px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
}

.brand { font-size:28px; font-weight:900; color:var(--primary); display:flex; align-items:center; gap:12px; }

.sidebar {
  width: 280px; background:var(--surface); height:calc(100vh - 88px); border-right:1px solid var(--border); padding:32px 24px; position:fixed; display:flex; flex-direction:column;
}

.nav-item {
  padding:16px 20px; border-radius:16px; margin-bottom:8px; cursor:pointer; font-weight:500;
}

.main { margin-left:280px; padding:50px 60px; }

.card {
  background:var(--surface); 
  border-radius:24px; 
  padding:36px; 
  border:1px solid var(--border);
  box-shadow:0 10px 35px rgba(0,0,0,0.07);
}

.viewer {
  height:460px; 
  background:#1e2937; 
  border-radius:20px; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  color:#94a3b8; 
  font-size:18px;
}

.vehicle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 32px;
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">🚐 Inhofer Flottenmanagement</div>
  <div id="userBox" style="display:flex;align-items:center;gap:12px"></div>
</div>

<div style="display:flex">
  <div class="sidebar">
    <div onclick="location.href='index.html'" class="nav-item">🚘 Fahrzeuge</div>
    <div onclick="location.href='history.html'" class="nav-item">🕒 Historie</div>
    <div id="adminLink" onclick="location.href='admin.html'" class="nav-item" style="display:none;">👤 Admin Panel</div>
    <button onclick="logout()" style="margin-top:auto;padding:14px 24px;background:#ef4444;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">↩ Logout</button>
  </div>

  <div class="main">
    <h1 id="vehicleTitle" style="font-size:37px;margin-bottom:8px">Fahrzeug laden...</h1>
    <p id="plate" style="color:var(--muted);font-size:18px"></p>

    <div class="card" style="margin-top:30px">
      <h3>360° Ansicht</h3>
      <div class="viewer" id="viewer">
        Fahrzeugbild wird geladen...
      </div>
    </div>

    <div class="card" style="margin-top:30px">
      <h3>Neuen Schaden melden</h3>
      <input id="damageType" placeholder="Schadenart (z.B. Kratzer, Delle)" style="width:100%;padding:14px;margin:12px 0;border:1px solid var(--border);border-radius:12px">
      <input id="damageArea" placeholder="Bereich (z.B. vorne-links)" style="width:100%;padding:14px;margin:12px 0;border:1px solid var(--border);border-radius:12px">
      <textarea id="description" placeholder="Beschreibung..." rows="4" style="width:100%;padding:14px;margin:12px 0;border:1px solid var(--border);border-radius:12px"></textarea>
      
      <input type="file" id="images" multiple style="margin:12px 0">
      <button onclick="saveDamage()" style="width:100%;padding:16px;background:var(--primary);color:white;border:none;border-radius:12px;font-weight:700;margin-top:10px;cursor:pointer">Schaden speichern</button>
    </div>

    <div class="card" style="margin-top:30px">
      <h3>Aktive Schäden</h3>
      <div id="damageList"></div>
    </div>
  </div>
</div>

<script>
const db = window.supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

let vehicleId = new URLSearchParams(location.search).get("id");

async function loadUser() {
  const {data} = await db.auth.getSession();
  if (!data.session) return location.href = "login.html";

  const user = data.session.user;
  const {data: emp} = await db.from("employees").select("name,role").eq("email", user.email).maybeSingle();

  const name = emp?.name || user.email.split('@')[0];
  const role = emp?.role || "mitarbeiter";

  const roleHTML = role === "admin" 
    ? `<span style="background:#fee2e2;color:#991b1b;padding:6px 18px;border-radius:999px;font-size:13px">Admin</span>` 
    : `<span style="background:#dcfce7;color:#166534;padding:6px 18px;border-radius:999px;font-size:13px">Mitarbeiter</span>`;

  document.getElementById("userBox").innerHTML = `<strong>${name}</strong> ${roleHTML}`;
}

async function loadVehicle() {
  const {data} = await db.from("vehicles").select("*").eq("id", vehicleId).maybeSingle();
  if (data) {
    document.getElementById("vehicleTitle").textContent = data.name || "Fahrzeug";
    document.getElementById("plate").textContent = data.kennzeichen ? "Kennzeichen: " + data.kennzeichen : "";
  }
}

async function saveDamage() {
  alert("✅ Schaden wurde gespeichert (Demo - Funktion wird später erweitert)");
}

async function logout() {
  await db.auth.signOut();
  location.href = "login.html";
}

loadUser();
loadVehicle();
</script>
</body>
</html>
