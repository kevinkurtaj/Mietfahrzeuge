<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeug</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{--bg1:#f8fafc;--bg2:#e2e8f0;--line:#e5e7eb}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top right,rgba(37,99,235,.14),transparent 35%),linear-gradient(135deg,var(--bg1),var(--bg2));
  color: #111827;
}

header {
  position: sticky; top:0; z-index:10;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 28px;
}

.hero {
  margin-bottom: 16px;
}

.hero h1 {
  margin: 0 0 6px 0;
  font-size: 34px;
  letter-spacing: -.4px;
}

.hero p {
  margin: 0;
  color: #64748b;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 22px;
  margin-bottom: 18px;
  border:1px solid var(--line);
  box-shadow: 0 10px 30px rgba(15,23,42,0.08);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 12px;
  border: 1px solid #cbd5e1;
  box-sizing: border-box;
}

textarea {
  min-height: 80px;
}

button, .btn {
  background: #111827;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
}

button:hover,.btn:hover{opacity:.95}

.btn-secondary {
  background: #e5e7eb;
  color: #111827;
}

.zone {
  display: inline-block;
  background: #2563eb;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  margin: 4px;
  cursor: pointer;
  font-weight: bold;
}
.zone:hover{filter:brightness(1.05)}

.damage {
  border: 1px solid #e5e7eb;
  background: #f8fafc;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}

.small {
  font-size: 13px;
  color: #64748b;
}

.success {
  background: #dcfce7;
  color: #166534;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

.error {
  background: #fee2e2;
  color: #991b1b;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

.employee {
  display: inline-block;
  background: #eef2ff;
  color: #3730a3;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-top: 6px;
}

@media(max-width:800px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .hero h1{font-size:28px}
}
</style>
</head>

<body>

<header>
  <button class="btn-secondary" onclick="location.href='index.html'">← Zurück</button>
  <div id="userInfo">Lade Benutzer...</div>
  <button onclick="logout()">Logout</button>
</header>

<main>

<div class="hero">
  <h1 id="vehicleTitle">Fahrzeug wird geladen...</h1>
  <p id="vehicleSub" class="small"></p>
</div>

<div class="card">
  <h3>Zonen auswählen</h3>
  <div class="zone" onclick="setArea('vorne')">vorne</div>
  <div class="zone" onclick="setArea('hinten')">hinten</div>
  <div class="zone" onclick="setArea('Seite')">Seite</div>
  <div class="zone" onclick="setArea('Dach')">Dach</div>
  <div class="zone" onclick="setArea('Innenraum')">Innenraum</div>
</div>

<div class="grid">

  <div class="card">
    <h2>Schaden hinzufügen</h2>

    <input id="type" placeholder="z.B. Kratzer">
    <input id="area" placeholder="z.B. vorne">

    <select id="severity">
      <option value="leicht">leicht</option>
      <option value="mittel">mittel</option>
      <option value="schwer">schwer</option>
    </select>

    <textarea id="description" placeholder="Beschreibung"></textarea>

    <button onclick="saveDamage()">Schaden speichern</button>

    <div id="message"></div>
  </div>

  <div class="card">
    <h2>Fahrzeugstatus</h2>

    <select id="vehicleStatus">
      <option value="einsatzbereit">einsatzbereit</option>
      <option value="abruf">Abruf / Reserve</option>
      <option value="werkstatt">Werkstatt</option>
      <option value="nicht_einsatzbereit">nicht einsatzbereit</option>
      <option value="nicht_im_einsatz">nicht im Einsatz</option>
    </select>

    <textarea id="statusNote" placeholder="Notiz optional"></textarea>

    <button onclick="saveStatus()">Status speichern</button>

    <br><br>
    <button class="btn-secondary" onclick="location.href='history.html?id=' + vehicleId">
      Historie öffnen
    </button>

    <div id="statusMessage"></div>
  </div>

</div>

<div class="card">
  <h2>Aktive Schäden</h2>
  <div id="damageList">Schäden werden geladen...</div>
</div>

</main>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const vehicleId = Number(new URLSearchParams(window.location.search).get("id"));

let currentUser = null;
let currentEmployee = null;
let employeesMap = {};

function setArea(area) {
  document.getElementById("area").value = area;
}

function showMessage(id, text, type = "success") {
  const safeType = type === "error" ? "error" : "success";
  document.getElementById(id).innerHTML = `<div class="${safeType}">${esc(text)}</div>`;
}

function formatDate(value) {
  return value ? new Date(value).toLocaleString("de-DE") : "-";
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;"
  }[ch]));
}

async function init() {
  if (!Number.isInteger(vehicleId) || vehicleId <= 0) {
    document.getElementById("vehicleTitle").textContent = "Ungültige Fahrzeug-ID";
    document.getElementById("damageList").innerHTML = `<div class="error">Bitte ein gültiges Fahrzeug öffnen.</div>`;
    return;
  }

  const { data: sessionData } = await db.auth.getSession();
  currentUser = sessionData.session?.user;

  if (!currentUser) {
    location.href = "index.html";
    return;
  }

  const { data: employee } = await db
    .from("employees")
    .select("*")
    .eq("email", currentUser.email)
    .maybeSingle();

  currentEmployee = employee;

  if (!currentEmployee) {
    document.getElementById("userInfo").textContent = "⚠ Kein Mitarbeiter gefunden";
  } else {
    document.getElementById("userInfo").textContent = "👤 " + (currentEmployee.name || currentEmployee.email || "Unbekannt");
  }

  await loadEmployees();
  await loadVehicle();
  await loadDamages();
}

async function loadEmployees() {
  const { data, error } = await db.from("employees").select("*");
  if (error) return;

  employeesMap = {};
  (data || []).forEach(emp => {
    employeesMap[emp.id] = emp.name || emp.email || "Mitarbeiter " + emp.id;
  });
}

function employeeName(id) {
  return esc(employeesMap[id] || "Unbekannt");
}

async function loadVehicle() {
  const { data, error } = await db
    .from("vehicles")
    .select("*")
    .eq("id", vehicleId)
    .maybeSingle();

  if (error || !data) {
    document.getElementById("vehicleTitle").innerText = "Fahrzeug nicht gefunden";
    document.getElementById("vehicleSub").innerText = error?.message || "Bitte über die Fahrzeugübersicht öffnen.";
    return;
  }

  document.getElementById("vehicleTitle").innerText =
    (data.name || "Fahrzeug") + (data.kennzeichen ? " (" + data.kennzeichen + ")" : "");

  document.getElementById("vehicleSub").innerText = "Fahrzeug-ID: " + data.id;

  document.getElementById("vehicleStatus").value = data.status || "einsatzbereit";
}

async function loadDamages() {
  const { data, error } = await db
    .from("damages")
    .select("*")
    .eq("vehicle_id", vehicleId)
    .order("created_at", { ascending: false });

  if (error) {
    document.getElementById("damageList").innerHTML =
      `<div class="error">${esc(error.message)}</div>`;
    return;
  }

  const active = (data || []).filter(d =>
    d.status !== "repariert" && d.status !== "irrtuemlich"
  );

  if (active.length === 0) {
    document.getElementById("damageList").innerHTML = "Keine aktiven Schäden.";
    return;
  }

  document.getElementById("damageList").innerHTML = active.map(d => `
    <div class="damage">
      <strong>${esc(d.damage_type || "-")}</strong><br>
      ${esc(d.area || "-")} · ${esc(d.severity || "-")}<br>
      <div class="employee">👤 Gemeldet von: ${employeeName(d.employee_id)}</div>
      <div class="small">${esc(formatDate(d.created_at))}</div>
      <p>${esc(d.description || "")}</p>

      <button onclick="markDamage(${d.id}, 'repariert')">Repariert</button>
      <button onclick="markDamage(${d.id}, 'irrtuemlich')">Irrtümlich</button>
    </div>
  `).join("");
}

async function saveDamage() {
  const type = document.getElementById("type").value.trim();
  const area = document.getElementById("area").value.trim();
  const severity = document.getElementById("severity").value;
  const description = document.getElementById("description").value.trim();

  if (!type || !area) {
    showMessage("message", "Bitte Schadensart und Bereich eingeben.", "error");
    return;
  }

  if (!currentUser) {
    showMessage("message", "Nicht eingeloggt.", "error");
    return;
  }

  if (!currentEmployee) {
    showMessage(
      "message",
      "Kein Mitarbeiter zu deinem Login gefunden. Prüfe employees.email.",
      "error"
    );
    return;
  }

  const { data: damage, error } = await db
    .from("damages")
    .insert([{
      vehicle_id: vehicleId,
      damage_type: type,
      area: area,
      severity: severity,
      description: description,
      status: "offen",
      user_id: currentUser.id,
      employee_id: currentEmployee.id
    }])
    .select()
    .single();

  if (error) {
    console.error(error);
    showMessage("message", "Fehler: " + (error.message || "Unbekannter Fehler"), "error");
    return;
  }

  const { error: historyError } = await db
    .from("damage_history")
    .insert([{
      damage_id: damage.id,
      action: "angelegt",
      details: "Schaden angelegt: " + type + " / " + area,
      user_id: currentEmployee.id,
      auth_user_id: currentUser.id
    }]);

  if (historyError) {
    console.error(historyError);
    showMessage("message", "Schaden gespeichert, aber Historie Fehler: " + (historyError.message || "Unbekannter Fehler"), "error");
    return;
  }

  showMessage("message", "✅ Schaden gespeichert. Gemeldet von: " + currentEmployee.name);

  document.getElementById("type").value = "";
  document.getElementById("area").value = "";
  document.getElementById("description").value = "";

  await loadDamages();
}

async function saveStatus() {
  const status = document.getElementById("vehicleStatus").value;
  const note = document.getElementById("statusNote").value.trim();

  const { error } = await db
    .from("vehicles")
    .update({ status: status })
    .eq("id", vehicleId);

  if (error) {
    showMessage("statusMessage", "Fehler: " + (error.message || "Unbekannter Fehler"), "error");
    return;
  }

  await db.from("vehicle_history").insert([{
    vehicle_id: vehicleId,
    action: "fahrzeugstatus_geaendert",
    details: note || status,
    user_id: currentEmployee?.id || null,
    auth_user_id: currentUser?.id || null
  }]);

  showMessage("statusMessage", "✅ Status gespeichert.");
}

async function markDamage(id, status) {
  const note = prompt(
    status === "repariert"
      ? "Notiz zur Reparatur:"
      : "Warum irrtümlich?"
  ) || status;

  const { error } = await db
    .from("damages")
    .update({ status: status })
    .eq("id", id);

  if (error) {
    alert(error.message);
    return;
  }

  await db.from("damage_history").insert([{
    damage_id: id,
    action: status,
    details: note,
    user_id: currentEmployee?.id || null,
    auth_user_id: currentUser?.id || null
  }]);

  await loadDamages();
}

async function logout() {
  await db.auth.signOut();
  location.href = "index.html";
}

init();
</script>

</body>
</html>
