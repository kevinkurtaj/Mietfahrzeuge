<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeughistorie</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg1:#f8fafc;--bg2:#e2e8f0;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--blue:#2563eb}
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{margin:0;color:var(--ink);background:#f4f7fb}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 22px;display:flex;justify-content:space-between;align-items:center}
main{max-width:1080px;margin:auto;padding:20px}
.title{font-weight:900;font-size:24px;letter-spacing:-.4px}
.back{color:#1d4ed8;font-weight:700;text-decoration:none}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 10px 28px rgba(15,23,42,.08);margin-bottom:10px}
input,select{padding:11px 12px;border:1px solid #cbd5e1;border-radius:10px;background:#fff}
input{min-width:240px;flex:1}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.14)}
.tag{display:inline-block;background:#dbeafe;color:#1d4ed8;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800;margin-left:6px}
.small{font-size:13px;color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:20px}
</style>
</head>
<body>
<header>
  <div class="title">📜 Fahrzeughistorie</div>
  <a class="back" href="index.html">Zurück</a>
</header>
<main>
  <div class="toolbar">
    <input id="search" placeholder="Suche in Aktion, Details, Fahrzeug, Mitarbeiter...">
    <select id="typeFilter"><option value="all">Typ: Alle</option><option value="vehicle">Fahrzeugstatus</option><option value="damage">Schäden</option></select>
    <select id="employeeFilter"><option value="all">Mitarbeiter: Alle</option></select>
  </div>
  <div id="historyList"></div>
  <div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(2,6,23,.55);padding:20px;z-index:60" onclick="if(event.target===this)this.style.display='none'">
    <div style="max-width:700px;margin:8vh auto;background:#fff;border-radius:16px;padding:18px">
      <h3>Eintrag-Details</h3><div id="modalBody"></div><button onclick="document.getElementById('detailModal').style.display='none'">Schließen</button>
    </div></div>
</main>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const list = document.getElementById("historyList");
const search = document.getElementById("search");
const typeFilter = document.getElementById("typeFilter");
const employeeFilter = document.getElementById("employeeFilter");
const vehicleId = Number(new URLSearchParams(window.location.search).get("id"));

let entries = [];
let employeeMap = {};
const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
let imagesByDamage = {};

function fmtDate(v){return v ? new Date(v).toLocaleString("de-DE") : "-";}
function statusLabel(s){return s||"-";}
function actionLabel(a){return label(a);}
function label(action){
  switch(action){
    case "angelegt": return "Schaden angelegt";
    case "repariert": return "Repariert";
    case "irrtuemlich": return "Irrtümlich";
    default: return action || "-";
  }
}

async function loadHistory(){
  const { data: session } = await db.auth.getSession();
  if (!session.session?.user) {
    list.innerHTML = '<div class="card">Bitte zuerst einloggen. <a href="index.html">Zur Anmeldung</a></div>';
    return;
  }

  const { data: employees } = await db.from("employees").select("id,name,email"); employeeMap={}; (employees||[]).forEach(e=>employeeMap[e.id]=e.name||e.email||`Mitarbeiter ${e.id}`); employeeFilter.innerHTML = `<option value="all">Mitarbeiter: Alle</option>` + Object.entries(employeeMap).map(([id,n])=>`<option value="${id}">${esc(n)}</option>`).join("");

  const { data, error } = await db
    .from("damage_history")
    .select(`
      id,
      action,
      created_at,
      details,
      user_id,
      damages (
        id,
        damage_type,
        area,
        vehicle_id
      )
    `)
    .order("created_at", { ascending: false });

  if (error) {
    list.innerHTML = `<div class="card">❌ ${esc(error.message)}</div>`;
    return;
  }

  entries = (data || []).filter(item => {
    if (!Number.isInteger(vehicleId) || vehicleId <= 0) return true;
    return Number(item?.damages?.vehicle_id) === vehicleId;
  });

  const ids = entries.map(e => e?.damages?.id).filter(Boolean);
  if (ids.length > 0) {
    const { data: imgs } = await db.from("damage_images").select("*").in("damage_id", ids);
    imagesByDamage = {};
    (imgs || []).forEach(img => {
      if (!imagesByDamage[img.damage_id]) imagesByDamage[img.damage_id] = [];
      imagesByDamage[img.damage_id].push(img);
    });
  } else {
    imagesByDamage = {};
  }

  render();
}

function render(){
  const s = search.value.toLowerCase();
  const t = typeFilter.value;
  const eFilter = employeeFilter.value;

  const filtered = entries.filter(item => {
    const haystack = [item.action, item.details, item.user_id, item.damages?.damage_type, item.damages?.area]
      .map(v => String(v ?? "").toLowerCase())
      .join(" ");

    const isDamage = !!item.damages;
    const typeOk = t === "all" || (t === "damage" && isDamage) || (t === "vehicle" && !isDamage);
    const empOk = eFilter === "all" || String(item.user_id) === eFilter;
    return haystack.includes(s) && typeOk && empOk;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="card empty">Keine Einträge gefunden.</div>';
    return;
  }

  list.innerHTML = filtered.map(item => `
    <div class="card">
      <div><strong>${esc(label(item.action))}</strong><span class="tag">${esc(item.damages?.damage_type || "-")}</span></div>
      <div class="small" style="margin-top:6px">📍 ${esc(item.damages?.area || "-")} · 👤 Aktion von: ${esc(employeeMap[item.user_id] || item.user_id || "-")}</div>
      <div style="margin-top:8px">📝 ${esc(item.details || "-")}</div><button style="margin-top:8px" onclick="openDetail(${item.id})">Details</button>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        ${(imagesByDamage[item?.damages?.id] || []).map(img => `<a href="${esc(img.public_url || "#")}" target="_blank" rel="noopener"><img src="${esc(img.public_url || "")}" alt="Bild" style="width:92px;height:72px;object-fit:cover;border-radius:10px;border:1px solid #cbd5e1"></a>`).join("")}
      </div>
      <div class="small" style="margin-top:8px">🕒 ${esc(fmtDate(item.created_at))}</div>
    </div>
  `).join("");
}

search.addEventListener("input", render);
typeFilter.addEventListener("change", render);
employeeFilter.addEventListener("change", render);
function openDetail(id){const it=entries.find(x=>x.id===id);if(!it)return;document.getElementById("modalBody").innerHTML=`<p><strong>${esc(actionLabel(it.action))}</strong></p><p>${esc(it.details||"-")}</p><p>${esc(fmtDate(it.created_at))}</p>`;document.getElementById("detailModal").style.display="block";}
loadHistory();
</script>
</body>
</html>
