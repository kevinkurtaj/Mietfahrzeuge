*{box-sizing:border-box;font-family:Inter,Arial,Helvetica,sans-serif}

function emp(id){return employeesMap[id]||"Unbekannt";}
async function loadHistory(){let vehicleIds=[]; if(vehicleId){const {data:v}=await db.from("vehicles").select("*").eq("id",Number(vehicleId)).maybeSingle(); if(v){vehicleName=(v.name||"Fahrzeug")+(v.kennzeichen?" ("+v.kennzeichen+")":"");document.getElementById("title").textContent="Historie – "+vehicleName;}vehicleIds=[Number(vehicleId)];} const vhq=db.from("vehicle_history").select("*").order("created_at",{ascending:false}); if(vehicleId) vhq.eq("vehicle_id",Number(vehicleId)); const {data:vh,error:e1}=await vhq; if(e1){showToast(e1.message,"error");return;} const dq=db.from("damages").select("*"); if(vehicleId) dq.eq("vehicle_id",Number(vehicleId)); const {data:damages,error:e2}=await dq; if(e2){showToast(e2.message,"error");return;} damagesMap={};(damages||[]).forEach(d=>damagesMap[d.id]=d);const ids=(damages||[]).map(d=>d.id); let dh=[]; if(ids.length){const {data,error}=await db.from("damage_history").select("*").in("damage_id",ids).order("created_at",{ascending:false}); if(error){showToast(error.message,"error");return;} dh=data||[];} allData=[...(vh||[]).map(i=>({...i,type:"vehicle",title:"Fahrzeugstatus",employee_id:i.user_id,employee:emp(i.user_id)})),...dh.map(i=>{const d=damagesMap[i.damage_id]||{};const eid=i.user_id||d.employee_id;return {...i,type:"damage",title:[d.damage_type||"Schaden",d.area||"",d.severity||""].filter(Boolean).join(" / "),employee_id:eid,employee:emp(eid),reported_employee_id:d.employee_id,reported_employee:emp(d.employee_id)};})];allData.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));render();}
function render(){const s=document.getElementById("search").value.toLowerCase(),t=document.getElementById("typeFilter").value,e=document.getElementById("employeeFilter").value;const data=allData.filter(i=>(t==="all"||i.type===t)&&(e==="all"||String(i.employee_id)===e||String(i.reported_employee_id)===e)&&JSON.stringify(i).toLowerCase().includes(s));document.getElementById("historyList").innerHTML=data.map((i,idx)=>`<article class="card panel timeline-card ${i.type}"><span class="badge ${i.type==='damage'?'abruf':'einsatzbereit'}">${i.type==='damage'?'⚠️ Schaden':'🚘 Fahrzeug'} · ${actionLabel(i.action)}</span><h3>${esc(i.title||"-")}</h3><p style="color:var(--muted)">${fullDateTime(i.created_at)} · Aktion von <strong>${esc(i.employee)}</strong></p>${i.type==='damage'?`<p>📝 Schaden gemeldet von: <strong>${esc(i.reported_employee)}</strong></p>`:""}<p>${esc(i.details||"-")}</p><button class="secondary-btn" onclick="openModal(${allData.indexOf(i)})">Details anzeigen</button></article>`).join("")||'<div class="empty-state">Keine Einträge gefunden.</div>';}
function openModal(i){const item=allData[i];document.getElementById("modalContent").innerHTML=`<h2 style="margin-top:0">Detailansicht</h2><p><strong>Typ:</strong> ${item.type==='damage'?'Schaden':'Fahrzeug'}</p><p><strong>Aktion:</strong> ${actionLabel(item.action)}</p><p><strong>Aktion von:</strong> ${esc(item.employee)}</p>${item.type==='damage'?`<p><strong>Gemeldet von:</strong> ${esc(item.reported_employee)}</p>`:""}<p><strong>Zeitpunkt:</strong> ${fullDateTime(item.created_at)}</p><p><strong>Details:</strong><br>${esc(item.details||"-")}</p>`;document.getElementById("modal").style.display="flex";}function closeModal(){document.getElementById("modal").style.display="none";}search.addEventListener("input",render);typeFilter.addEventListener("change",render);employeeFilter.addEventListener("change",render);init();
</script></body></html>
