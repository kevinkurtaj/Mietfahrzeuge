<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

header {
  background:white;
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

main { padding:20px; max-width:1000px; margin:auto; }

input, select, button {
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:5px;
}

button { cursor:pointer; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.tag { padding:4px 8px; border-radius:8px; font-size:12px; font-weight:bold; }
.vehicle { background:#dbeafe; color:#1d4ed8; }
.damage { background:#fee2e2; color:#991b1b; }
.success { background:#dcfce7; color:#166534; }

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<header>
<div>🚗 Fahrzeug System</div>
<button onclick="logout()">Logout</button>
</header>

<main>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Passwort"><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div>
<input id="searchInput" placeholder="Suche">
<select id="filter">
<option value="all">Alle</option>
<option value="vehicle">Fahrzeug</option>
<option value="damage">Schaden</option>
</select>
</div>

<div id="historyApp"></div>

</div>

</main>

<div id="modal" class="modal">
<div class="modal-box">
<div id="modalContent"></div>
<button onclick="closeModal()">Schließen</button>
</div>
</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allData = [];
let user = null;

// LOGIN
async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  if(error) return alert("Login Fehler");

  user = data.user;
  startApp();
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// CHECK SESSION
async function checkUser(){
  const { data } = await supabase.auth.getSession();
  if(data.session){
    user = data.session.user;
    startApp();
  }
}

function startApp(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
  loadHistory();
}

// LOAD HISTORY
async function loadHistory(){

const vehicleId = new URLSearchParams(window.location.search).get("id");

const { data: vh } = await supabase
.from("vehicle_history")
.select("*")
.eq("vehicle_id", vehicleId);

const { data: dmg } = await supabase
.from("damages")
.select("id")
.eq("vehicle_id", vehicleId);

const ids = (dmg||[]).map(d=>d.id);

let dh=[];
if(ids.length){
const res = await supabase
.from("damage_history")
.select("*")
.in("damage_id", ids);

dh = res.data||[];
}

allData=[
...(vh||[]).map(i=>({...i,type:"vehicle"})),
...(dh||[]).map(i=>({...i,type:"damage"}))
];

render();
}

// RENDER
function render(){

const search=document.getElementById("searchInput").value.toLowerCase();
const filter=document.getElementById("filter").value;

let data = allData.filter(i=>{
return (!search || (i.details||"").toLowerCase().includes(search)) &&
(filter==="all" || i.type===filter);
});

data.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

document.getElementById("historyApp").innerHTML = data.map(item=>{

let tag="vehicle", label="🚗 Fahrzeug";

if(item.type==="damage"){
label="⚠️ Schaden";
tag="damage";
if(item.action==="repariert") tag="success";
}

return `
<div class="card"
data-item='${encodeURIComponent(JSON.stringify(item))}'
onclick="handleClick(this)">

<div class="tag ${tag}">
${label} • ${item.action}
</div>

<div>
${new Date(item.created_at).toLocaleString()}
</div>

<div>
${item.details||""}
</div>

</div>
`;

}).join("");
}

// CLICK FIX
function handleClick(el){
const item = JSON.parse(decodeURIComponent(el.dataset.item));
openModal(item);
}

// MODAL
async function openModal(item){

let name="Unbekannt";

if(item.user_id){
const { data } = await supabase
.from("employees")
.select("name")
.eq("id", item.user_id)
.single();

if(data) name=data.name;
}

document.getElementById("modalContent").innerHTML=`
<h3>Detail</h3>
<p><b>Typ:</b> ${item.type}</p>
<p><b>Aktion:</b> ${item.action}</p>
<p><b>Mitarbeiter:</b> ${name}</p>
<p><b>Zeit:</b> ${new Date(item.created_at).toLocaleString()}</p>
<p><b>Details:</b><br>${item.details||"-"}</p>
`;

document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// EVENTS
document.getElementById("searchInput").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

// START
checkUser();
</script>

</body>
</html>
