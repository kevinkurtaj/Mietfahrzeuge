<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fahrzeughistorie</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 30px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

a {
  text-decoration: none;
  color: #111827;
  font-weight: bold;
}

h1 {
  margin: 0;
}

.filters {
  display: grid;
  grid-template-columns: 1fr 220px 220px;
  gap: 12px;
  margin-bottom: 20px;
}

input, select {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  cursor: pointer;
}

.tag {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 8px;
}

.damage {
  background: #fee2e2;
  color: #991b1b;
}

.vehicle {
  background: #dbeafe;
  color: #1d4ed8;
}

.success {
  background: #dcfce7;
  color: #166534;
}

.warning {
  background: #fef3c7;
  color: #92400e;
}

.small {
  color: #64748b;
  font-size: 13px;
  margin-top: 5px;
}

.employee {
  display: inline-block;
  margin-top: 8px;
  background: #eef2ff;
  color: #3730a3;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: bold;
}

.error {
  background: #fef2f2;
  color: #991b1b;
  padding: 15px;
  border-radius: 12px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  padding: 25px;
  border-radius: 18px;
  width: 90%;
  max-width: 500px;
}

button {
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #111827;
  color: white;
  cursor: pointer;
}

@media(max-width: 800px) {
  .filters {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <a id="backLink" href="index.html">← Zurück</a>
  <h1>Fahrzeughistorie</h1>
</div>

<div class="filters">
  <input id="search" placeholder="Suche nach Details, Aktion, Mitarbeiter ...">

  <select id="typeFilter">
    <option value="all">Alle Einträge</option>
    <option value="damage">Nur Schäden</option>
    <option value="vehicle">Nur Fahrzeugstatus</option>
  </select>

  <select id="employeeFilter">
    <option value="all">Alle Mitarbeiter</option>
  </select>
</div>

<div id="historyApp">Historie wird geladen ...</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <div id="modalContent"></div>
    <button onclick="closeModal()">Schließen</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const vehicleId = params.get("id");

const historyApp = document.getElementById("historyApp");
const searchInput = document.getElementById("search");
const typeFilter = document.getElementById("typeFilter");
const employeeFilter = document.getElementById("employeeFilter");

let allData = [];
let employees = [];
let employeesMap = {};
let damagesMap = {};
let vehicleName = "";

if (vehicleId) {
  document.getElementById("backLink").href = "vehicle.html?id=" + vehicleId;
}

function formatDate(value) {
  return value ? new Date(value).toLocaleString("de-DE") : "-";
}

function actionLabel(action) {
  switch (action) {
    case "angelegt": return "Schaden angelegt";
    case "bilder_hochgeladen": return "Bilder hochgeladen";
    case "repariert": return "Schaden repariert";
    case "irrtuemlich": return "Schaden irrtümlich";
    case "bearbeitet": return "Schaden bearbeitet";
    case "fahrzeugstatus_geaendert": return "Fahrzeugstatus geändert";
    case "status_geaendert": return "Fahrzeugstatus geändert";
    default: return action || "-";
  }
}

function employeeName(id) {
  return employeesMap[id] || "Unbekannt";
}

function getTagClass(item) {
  if (item.type === "vehicle") return "vehicle";
  if (item.action === "repariert") return "success";
  if (item.action === "irrtuemlich") return "warning";
  return "damage";
}

async function loadEmployees() {
  const { data, error } = await db
    .from("employees")
    .select("id, name, email")
    .order("name");

  if (error) return;

  employees = data || [];
  employeesMap = {};

  employees.forEach(emp => {
    employeesMap[emp.id] = emp.name || emp.email || "Mitarbeiter " + emp.id;
  });

  employeeFilter.innerHTML =
    `<option value="all">Alle Mitarbeiter</option>` +
    employees.map(emp => `
      <option value="${emp.id}">
        ${emp.name || emp.email || "Mitarbeiter " + emp.id}
      </option>
    `).join("");
}

async function loadVehicle() {
  const { data } = await db
    .from("vehicles")
    .select("*")
    .eq("id", Number(vehicleId))
    .maybeSingle();

  if (data) {
    vehicleName = (data.name || "Fahrzeug") + (data.kennzeichen ? " — " + data.kennzeichen : "");
  }
}

async function loadHistory() {
  if (!vehicleId) {
    historyApp.innerHTML = `<div class="error">Keine Fahrzeug-ID gefunden.</div>`;
    return;
  }

  await loadEmployees();
  await loadVehicle();

  const { data: vehicleHistory, error: vehicleError } = await db
    .from("vehicle_history")
    .select("*")
    .eq("vehicle_id", Number(vehicleId));

  if (vehicleError) {
    historyApp.innerHTML = `<div class="error">${vehicleError.message}</div>`;
    return;
  }

  const { data: damages, error: damagesError } = await db
    .from("damages")
    .select("*")
    .eq("vehicle_id", Number(vehicleId));

  if (damagesError) {
    historyApp.innerHTML = `<div class="error">${damagesError.message}</div>`;
    return;
  }

  damagesMap = {};
  const damageIds = (damages || []).map(d => d.id);

  (damages || []).forEach(d => {
    damagesMap[d.id] = d;
  });

  let damageHistory = [];

  if (damageIds.length > 0) {
    const { data, error } = await db
      .from("damage_history")
      .select("*")
      .in("damage_id", damageIds);

    if (error) {
      historyApp.innerHTML = `<div class="error">${error.message}</div>`;
      return;
    }

    damageHistory = data || [];
  }

  allData = [
    ...(vehicleHistory || []).map(item => ({
      ...item,
      type: "vehicle",
      title: "Fahrzeugstatus",
      employee_id: item.user_id,
      employee_name: employeeName(item.user_id),
      reported_employee_id: null,
      reported_employee_name: null
    })),

    ...(damageHistory || []).map(item => {
      const damage = damagesMap[item.damage_id] || {};
      const reportedEmployeeId = damage.employee_id;
      const actionEmployeeId = item.user_id || reportedEmployeeId;

      return {
        ...item,
        type: "damage",
        title: [
          damage.damage_type || "Schaden",
          damage.area || "",
          damage.severity || ""
        ].filter(Boolean).join(" / "),
        employee_id: actionEmployeeId,
        employee_name: employeeName(actionEmployeeId),
        reported_employee_id: reportedEmployeeId,
        reported_employee_name: employeeName(reportedEmployeeId)
      };
    })
  ];

  allData.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  renderHistory();
}

function renderHistory() {
  const search = searchInput.value.toLowerCase();
  const type = typeFilter.value;
  const emp = employeeFilter.value;

  const filtered = allData.filter(item => {
    const text = [
      item.type,
      item.action,
      item.details,
      item.title,
      item.employee_name,
      item.reported_employee_name
    ].join(" ").toLowerCase();

    const matchesSearch = text.includes(search);
    const matchesType = type === "all" || item.type === type;
    const matchesEmployee =
      emp === "all" ||
      String(item.employee_id) === emp ||
      String(item.reported_employee_id) === emp;

    return matchesSearch && matchesType && matchesEmployee;
  });

  if (filtered.length === 0) {
    historyApp.innerHTML = `<div class="card">Keine passenden Einträge gefunden.</div>`;
    return;
  }

  historyApp.innerHTML = filtered.map(item => {
    const index = allData.indexOf(item);

    return `
      <div class="card" onclick="openModal(${index})">
        <div class="tag ${getTagClass(item)}">
          ${item.type === "vehicle" ? "🚗 Fahrzeug" : "⚠️ Schaden"} • ${actionLabel(item.action)}
        </div>

        <div><strong>${item.title || "-"}</strong></div>

        <div class="employee">
          👤 Aktion von: ${item.employee_name || "Unbekannt"}
        </div>

        ${item.type === "damage" ? `
          <div class="employee">
            📝 Schaden gemeldet von: ${item.reported_employee_name || "Unbekannt"}
          </div>
        ` : ""}

        <div class="small">${formatDate(item.created_at)}</div>
        <div>${item.details || "-"}</div>
      </div>
    `;
  }).join("");
}

function openModal(index) {
  const item = allData[index];

  document.getElementById("modalContent").innerHTML = `
    <h2>Detailansicht</h2>
    <p><strong>Typ:</strong> ${item.type === "vehicle" ? "Fahrzeug" : "Schaden"}</p>
    <p><strong>Aktion:</strong> ${actionLabel(item.action)}</p>
    <p><strong>Aktion von:</strong> ${item.employee_name || "Unbekannt"}</p>
    ${item.type === "damage" ? `
      <p><strong>Schaden gemeldet von:</strong> ${item.reported_employee_name || "Unbekannt"}</p>
    ` : ""}
    <p><strong>Fahrzeug:</strong> ${vehicleName || "Fahrzeug-ID " + vehicleId}</p>
    <p><strong>Zeitpunkt:</strong> ${formatDate(item.created_at)}</p>
    <p><strong>Details:</strong><br>${item.details || "-"}</p>
  `;

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

searchInput.addEventListener("input", renderHistory);
typeFilter.addEventListener("change", renderHistory);
employeeFilter.addEventListener("change", renderHistory);

loadHistory();
</script>

</body>
</html>
