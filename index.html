<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inhofer Flottenmanagement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #1e40af;
}

[data-theme="dark"] {
  --bg: #0a0f1c;
  --surface: #121a2e;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--surface); height:86px; padding:0 48px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
}

.brand { font-size:28px; font-weight:900; color:var(--primary); display:flex; align-items:center; gap:12px; }

.user-info {
  display:flex; align-items:center; gap:12px;
}

.role {
  padding:4px 14px; border-radius:999px; font-size:13px; font-weight:600;
}

.main { margin-left:280px; padding:48px 60px; }

.stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:28px; margin-bottom:52px; }

.stat-card {
  background:var(--surface); border-radius:24px; padding:32px; border:1px solid var(--border);
}

.vehicle-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(400px,1fr)); gap:32px;
}

.vehicle-card {
  background:var(--surface); border-radius:24px; padding:36px; cursor:pointer; transition:0.3s; border:1px solid var(--border);
}

.vehicle-card:hover {
  transform:translateY(-12px); box-shadow:0 30px 60px rgba(30,64,175,0.2);
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">🚐 Inhofer Flottenmanagement</div>
  
  <div class="user-info" id="userInfo">
    <!-- Wird per JS gefüllt -->
  </div>
</div>

<div class="main">
  <h1 style="font-size:36px;margin-bottom:8px">Fahrzeugübersicht</h1>
  <p style="color:var(--muted);font-size:18px">Alle Mietfahrzeuge im Überblick</p>

  <div class="stats">
    <div class="stat-card">
      <div style="color:var(--muted)">Gesamt Fahrzeuge</div>
      <strong id="total" style="font-size:54px;font-weight:800">0</strong>
    </div>
    <div class="stat-card">
      <div style="color:var(--muted)">Einsatzbereit</div>
      <strong id="ready" style="font-size:54px;font-weight:800;color:#16a34a">0</strong>
    </div>
    <div class="stat-card">
      <div style="color:var(--muted)">In Wartung / Nicht verfügbar</div>
      <strong id="blocked" style="font-size:54px;font-weight:800;color:#f59e0b">0</strong>
    </div>
  </div>

  <div id="vehicleList" class="vehicle-grid"></div>
</div>

<script>
const db = window.supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

async function loadUser() {
  const {data} = await db.auth.getSession();
  if (!data.session) return location.href = "login.html";

  const user = data.session.user;
  const {data: emp} = await db.from("employees").select("name,role").eq("email", user.email).maybeSingle();

  const name = emp?.name || user.email.split('@')[0];
  const role = emp?.role || "mitarbeiter";

  const roleHTML = role === "admin" 
    ? `<span class="role" style="background:#fee2e2;color:#991b1b">Admin</span>` 
    : `<span class="role" style="background:#dcfce7;color:#166534">Mitarbeiter</span>`;

  document.getElementById("userInfo").innerHTML = `
    <div style="text-align:right">
      <strong>${name}</strong><br>
      ${roleHTML}
    </div>
  `;
}

async function loadVehicles() {
  const {data: vehicles} = await db.from("vehicles").select("*");
  
  document.getElementById("total").textContent = vehicles.length;
  document.getElementById("ready").textContent = vehicles.filter(v => v.status === "einsatzbereit").length;
  document.getElementById("blocked").textContent = vehicles.filter(v => v.status !== "einsatzbereit").length;

  const html = vehicles.map(v => `
    <div class="vehicle-card" onclick="location.href='vehicle.html?id=${v.id}'">
      <strong style="font-size:23px">${v.name || 'Fahrzeug'}</strong>
      <p style="color:var(--muted);margin:14px 0">${v.kennzeichen || '-'}</p>
      <span class="status" style="background:${v.status === 'einsatzbereit' ? '#dcfce7' : '#fef3c7'}; color:${v.status === 'einsatzbereit' ? '#166534' : '#92400e'}">
        ${v.status}
      </span>
    </div>
  `).join("");

  document.getElementById("vehicleList").innerHTML = html || "<p>Keine Fahrzeuge gefunden.</p>";
}

async function init() {
  await loadUser();
  await loadVehicles();
}

init();
</script>
</body>
</html>
