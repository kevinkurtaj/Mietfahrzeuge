<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeuge</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #eef2f7 0%, #dbe4ee 100%);
  color: #111827;
  min-height: 100vh;
}

/* HEADER */
header {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  padding: 18px 28px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 18px rgba(0,0,0,0.04);
}

header div {
  font-size: 20px;
  font-weight: 800;
}

header button {
  border: none;
  background: #111827;
  color: white;
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
}

/* MAIN */
main {
  padding: 30px;
  max-width: 1100px;
  margin: auto;
}

/* LOGIN */
#loginBox {
  width: 100%;
  max-width: 380px;
  margin: 120px auto 0;
  background: white;
  padding: 34px;
  border-radius: 24px;
  box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
  border: 1px solid #e5e7eb;
}

#loginBox h2 {
  margin: 0 0 8px;
  font-size: 28px;
}

#loginBox::before {
  content: "Schadendokumentation Mietfahrzeuge";
  display: block;
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 22px;
}

#loginBox input {
  width: 100%;
  padding: 13px 14px;
  margin-bottom: 12px;
  border: 1px solid #d1d5db;
  border-radius: 12px;
  font-size: 14px;
}

#loginBox input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

#loginBox button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  background: #111827;
  color: white;
  font-weight: 800;
  cursor: pointer;
}

#loginBox button:hover {
  background: #1f2937;
}

/* APP */
#vehicleList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  cursor: pointer;
  box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
  transition: 0.18s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
}

.card b {
  font-size: 18px;
}

.card::after {
  content: "Öffnen →";
  display: block;
  margin-top: 14px;
  color: #2563eb;
  font-weight: 700;
}
</style>
</head>

<body>

<header>
<div>🚗 Fahrzeuge</div>
<button onclick="logout()">Logout</button>
</header>

<main>

<!-- LOGIN -->
<div id="loginBox">
<h2>Anmeldung</h2>
<input id="email" placeholder="E-Mail-Adresse">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Einloggen</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div id="vehicleList"></div>
</div>

</main>

<script>
const supabase = window.supabase.createClient(
"https://iufkwovepjljycdulnwa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY"
);

// LOGIN
async function login(){
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  if(error){
    alert("Login fehlgeschlagen");
    return;
  }

  startApp();
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// CHECK LOGIN
async function checkUser(){
  const { data } = await supabase.auth.getSession();
  if(data.session){
    startApp();
  }
}

// START APP
function startApp(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadVehicles();
}

// LOAD VEHICLES
async function loadVehicles(){
  const { data } = await supabase
    .from("vehicles")
    .select("*");

  document.getElementById("vehicleList").innerHTML = data.map(v => `
    <div class="card" onclick="openVehicle(${v.id})">
      <b>${v.name}</b><br>
      ${v.kennzeichen || ""}
    </div>
  `).join("");
}

// OPEN VEHICLE
function openVehicle(id){
  location.href = "vehicle.html?id=" + id;
}

// INIT
checkUser();
</script>

</body>
</html>
