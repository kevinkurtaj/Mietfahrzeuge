<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inhofer Flottenmanagement</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #1e40af;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --card: #1e2937;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--card); height:82px; padding:0 40px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
}

.sidebar {
  width: 280px; background:var(--card); height:calc(100vh - 82px); border-right:1px solid var(--border); padding:30px 20px; position:fixed;
}

.main {
  margin-left:280px; padding:40px;
}

.stats {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:20px; margin-bottom:40px;
}

.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:20px; padding:24px;
}

.vehicle-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(380px,1fr)); gap:28px;
}

.vehicle-card {
  background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px; cursor:pointer; transition:0.3s;
}

.vehicle-card:hover {
  transform:translateY(-10px); box-shadow:0 25px 50px rgba(37,99,235,0.15);
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div style="font-size:26px;font-weight:900;color:var(--primary);display:flex;align-items:center;gap:12px">
    🚐 Inhofer Flottenmanagement
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <button onclick="toggleTheme()" style="background:none;border:1px solid var(--border);padding:10px 16px;border-radius:12px;cursor:pointer">🌗</button>
    <button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:10px 22px;border-radius:12px;cursor:pointer">Logout</button>
  </div>
</div>

<div style="display:flex">
  <div class="sidebar">
    <div style="padding:0 20px">
      <div style="padding:14px 20px;background:var(--primary);color:white;border-radius:12px;margin-bottom:8px;font-weight:600">🚘 Fahrzeuge</div>
      <div onclick="location.href='history.html'" style="padding:14px 20px;border-radius:12px;cursor:pointer;margin-bottom:8px">🕒 Historie</div>
      <div onclick="location.href='admin.html'" style="padding:14px 20px;border-radius:12px;cursor:pointer">👤 Admin Panel</div>
    </div>
  </div>

  <div class="main">
    <h1 style="font-size:32px;margin-bottom:6px">Fahrzeugübersicht</h1>
    <p style="color:var(--muted)">Alle Mietfahrzeuge im Überblick</p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div style="color:var(--muted)">Gesamt Fahrzeuge</div>
        <strong id="total" style="font-size:42px">0</strong>
      </div>
      <div class="stat-card">
        <div style="color:var(--muted)">Einsatzbereit</div>
        <strong id="ready" style="font-size:42px;color:#16a34a">0</strong>
      </div>
      <div class="stat-card">
        <div style="color:var(--muted)">In Werkstatt / Gesperrt</div>
        <strong id="blocked" style="font-size:42px;color:#ef4444">0</strong>
      </div>
    </div>

    <div id="vehicleList" class="vehicle-grid"></div>
  </div>
</div>

<script>
const db = window.supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

function toggleTheme() {
  const isDark = document.body.getAttribute("data-theme") === "dark";
  document.body.setAttribute("data-theme", isDark ? "light" : "dark");
  localStorage.setItem("theme", isDark ? "light" : "dark");
}

async function logout() {
  await db.auth.signOut();
  location.href = "login.html";
}

async function loadDashboard() {
  const {data: vehicles} = await db.from("vehicles").select("*");
  
  const total = vehicles.length;
  const ready = vehicles.filter(v => v.status === "einsatzbereit").length;
  const blocked = vehicles.filter(v => v.status !== "einsatzbereit").length;

  document.getElementById("total").textContent = total;
  document.getElementById("ready").textContent = ready;
  document.getElementById("blocked").textContent = blocked;

  const html = vehicles.map(v => `
    <div class="card vehicle-card" onclick="location.href='vehicle.html?id=${v.id}'">
      <strong style="font-size:21px">${v.name || 'Fahrzeug'}</strong>
      <p style="color:var(--muted);margin:12px 0">${v.kennzeichen || '-'}</p>
      <span class="status" style="background:${v.status === 'einsatzbereit' ? '#dcfce7' : '#fee2e2'}; color:${v.status === 'einsatzbereit' ? '#166534' : '#991b1b'}">
        ${v.status === 'einsatzbereit' ? 'Einsatzbereit' : v.status}
      </span>
    </div>
  `).join("");

  document.getElementById("vehicleList").innerHTML = html || "<p>Keine Fahrzeuge gefunden.</p>";
}

if (localStorage.getItem("theme") === "dark") document.body.setAttribute("data-theme", "dark");

loadDashboard();
</script>
</body>
</html>
