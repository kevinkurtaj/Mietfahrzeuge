<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeuge</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root{
  --bg:#f6f8fc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --blue:#2563eb;
  --green:#16a34a;
  --red:#ef4444;
  --shadow:0 10px 30px rgba(15,23,42,.06);
}

*{
  box-sizing:border-box;
  font-family:Inter, Arial, sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:#f6f8fc;
  color:var(--text);
  overflow-x:hidden;
}

.app-shell{
  width:100vw;
  min-height:100vh;
  background:rgba(255,255,255,.78);
}

.topbar{
  height:82px;
  padding:0 38px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:white;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-size:22px;
  font-weight:900;
}

.brand-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:var(--blue);
  font-size:24px;
}

.userbox{
  display:flex;
  align-items:center;
  gap:12px;
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#eef2ff;
  color:#1d4ed8;
  font-weight:900;
  display:grid;
  place-items:center;
}

.user-name{
  font-weight:900;
}

.user-role{
  color:var(--muted);
  font-size:13px;
}

.layout{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:calc(100vh - 82px);
}

.sidebar{
  border-right:1px solid var(--line);
  padding:28px 18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:white;
}

.nav{
  display:grid;
  gap:14px;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px 16px;
  border-radius:14px;
  color:#334155;
  text-decoration:none;
  font-weight:900;
  cursor:pointer;
  border:none;
  background:transparent;
  font-size:15px;
  text-align:left;
}

.nav-item.active{
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:white;
  box-shadow:0 14px 28px rgba(37,99,235,.24);
}

.nav-item:hover:not(.active){
  background:#f1f5f9;
}

.content{
  padding:42px 60px;
}

.page-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:30px;
}

.title-wrap{
  text-align:center;
  width:100%;
}

.title-wrap h1{
  margin:0;
  font-size:34px;
  letter-spacing:-1px;
}

.title-wrap p{
  margin:8px 0 0;
  color:var(--muted);
}

.date-box{
  position:absolute;
  right:60px;
  display:grid;
  grid-template-columns:auto 1fr;
  gap:8px 10px;
  color:#475569;
  font-size:14px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:22px;
  margin-bottom:30px;
}

.card{
  background:white;
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
}

.stat{
  padding:26px;
}

.stat .label{
  font-size:13px;
  color:var(--muted);
  font-weight:900;
}

.stat strong{
  display:block;
  margin-top:10px;
  font-size:36px;
}

.vehicle-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

.vehicle-card{
  padding:22px;
  cursor:pointer;
  transition:.18s;
}

.vehicle-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 44px rgba(15,23,42,.10);
}

.vehicle-card h3{
  margin:14px 0 6px;
  font-size:20px;
}

.badge{
  display:inline-flex;
  padding:7px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:#e5e7eb;
  color:#475569;
}

.badge.einsatzbereit{
  background:#dcfce7;
  color:#166534;
}

.badge.werkstatt,
.badge.nicht_einsatzbereit{
  background:#fee2e2;
  color:#991b1b;
}

.badge.abruf{
  background:#dbeafe;
  color:#1d4ed8;
}

.badge.nicht_im_einsatz{
  background:#e5e7eb;
  color:#374151;
}

.open-link{
  margin-top:18px;
  color:#2563eb;
  font-weight:950;
}

.empty-state{
  padding:32px;
  border-radius:18px;
  border:1px dashed #cbd5e1;
  background:#fbfdff;
  color:#64748b;
  text-align:center;
}

.toast{
  position:fixed;
  right:24px;
  bottom:24px;
  background:#0f172a;
  color:white;
  padding:14px 18px;
  border-radius:14px;
  box-shadow:0 20px 45px rgba(15,23,42,.24);
  display:none;
  z-index:50;
}

.toast.error{
  background:#991b1b;
}

.footer{
  color:#64748b;
  font-size:13px;
  text-align:center;
  padding:28px 0 0;
}

@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }

  .sidebar{
    display:none;
  }

  .content{
    padding:26px;
  }

  .stats{
    grid-template-columns:1fr 1fr;
  }

  .date-box{
    display:none;
  }
}

@media(max-width:650px){
  .topbar{
    height:auto;
    padding:18px;
    flex-direction:column;
    align-items:flex-start;
  }

  .stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="app-shell">

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🚐</div>
      <div>Schadendokumentation Mietfahrzeuge</div>
    </div>

    <div class="userbox">
      <div class="avatar" id="avatar">KK</div>
      <div>
        <div class="user-name" id="topUserName">Benutzer</div>
        <div class="user-role" id="topUserRole">Mitarbeiter</div>
      </div>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <nav class="nav">
        <a class="nav-item active" href="index.html">🚘 Fahrzeuge</a>
        <a class="nav-item" href="history.html">🕘 Historie</a>
        <a id="sidebarAdminLink" class="nav-item" href="admin.html" style="display:none;">👥 Admin Panel</a>
      </nav>

      <button class="nav-item" onclick="logout()">↩ Logout</button>
    </aside>

    <main class="content">

      <section class="page-head">
        <div class="title-wrap">
          <h1>Fahrzeugübersicht</h1>
          <p>Übersicht aller Mietfahrzeuge, Status und Schäden.</p>
        </div>

        <div class="date-box">
          <span>📅</span><span id="dateText">-</span>
          <span>🕙</span><span id="timeText">-</span>
        </div>
      </section>

      <section class="stats">
        <div class="card stat">
          <div class="label">Fahrzeuge</div>
          <strong id="vehicleCount">-</strong>
        </div>

        <div class="card stat">
          <div class="label">Einsatzbereit</div>
          <strong id="readyCount">-</strong>
        </div>

        <div class="card stat">
          <div class="label">Werkstatt / gesperrt</div>
          <strong id="blockedCount">-</strong>
        </div>

        <div class="card stat">
          <div class="label">Aktive Schäden</div>
          <strong id="damageCount">-</strong>
        </div>
      </section>

      <section id="vehicleList" class="vehicle-grid"></section>

      <div class="footer">© 2025 Möbel Inhofer GmbH & Co. KG</div>
    </main>

  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentEmployee = null;

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

function initials(name){
  const parts = String(name || "").trim().split(/\s+/);

  if (parts.length >= 2) {
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  return String(name || "U").slice(0,2).toUpperCase();
}

function showToast(message, type = "success"){
  const toast = document.getElementById("toast");
  toast.className = "toast " + type;
  toast.textContent = message;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 3500);
}

function statusLabel(status){
  switch(status){
    case "einsatzbereit":
      return "einsatzbereit";
    case "abruf":
      return "Abruf / Reserve";
    case "werkstatt":
      return "Werkstatt";
    case "nicht_einsatzbereit":
      return "nicht einsatzbereit";
    case "nicht_im_einsatz":
      return "nicht im Einsatz";
    default:
      return status || "unbekannt";
  }
}

async function getSessionUser(){
  const { data } = await db.auth.getSession();
  return data.session?.user || null;
}

async function getEmployeeByEmail(email){
  const { data } = await db
    .from("employees")
    .select("*")
    .eq("email", email)
    .maybeSingle();

  return data || null;
}

async function requireLogin(){
  const user = await getSessionUser();

  if (!user) {
    location.href = "login.html";
    return null;
  }

  return user;
}

async function logout(){
  await db.auth.signOut();
  location.href = "login.html";
}

function updateClock(){
  const now = new Date();

  document.getElementById("dateText").textContent =
    now.toLocaleDateString("de-DE");

  document.getElementById("timeText").textContent =
    now.toLocaleTimeString("de-DE", {
      hour:"2-digit",
      minute:"2-digit"
    }) + " Uhr";
}

async function hydrateTopUser(){
  const user = await getSessionUser();

  if (!user) return;

  const emp = await getEmployeeByEmail(user.email);
  currentEmployee = emp;

  const name = emp?.name || user.email;

  document.getElementById("topUserName").textContent = name;
  document.getElementById("topUserRole").textContent =
    emp?.role === "admin" ? "Admin" : "Mitarbeiter";

  document.getElementById("avatar").textContent = initials(name);

  const sidebarAdminLink = document.getElementById("sidebarAdminLink");

  if (sidebarAdminLink) {
    sidebarAdminLink.style.display =
      emp?.role === "admin" ? "flex" : "none";
  }
}

async function loadVehicles(){
  const { data: vehicles, error } = await db
    .from("vehicles")
    .select("*")
    .order("id", { ascending:true });

  if (error) {
    showToast(error.message, "error");
    return;
  }

  const { count: damageCount } = await db
    .from("damages")
    .select("id", { count:"exact", head:true })
    .not("status", "in", "(repariert,irrtuemlich)");

  const list = vehicles || [];

  document.getElementById("vehicleCount").textContent = list.length;

  document.getElementById("readyCount").textContent =
    list.filter(v => v.status === "einsatzbereit").length;

  document.getElementById("blockedCount").textContent =
    list.filter(v =>
      v.status === "werkstatt" ||
      v.status === "nicht_einsatzbereit"
    ).length;

  document.getElementById("damageCount").textContent =
    damageCount ?? 0;

  document.getElementById("vehicleList").innerHTML =
    list.map(vehicle => `
      <article class="card vehicle-card" onclick="location.href='vehicle.html?id=${vehicle.id}'">
        <span class="badge">Fahrzeug</span>

        <h3>${esc(vehicle.name || "Inhofer-Sprinter")}</h3>

        <div style="color:var(--muted);font-weight:800;margin-bottom:14px;">
          ${esc(vehicle.kennzeichen || "-")}
        </div>

        <span class="badge ${esc(vehicle.status || "")}">
          ${statusLabel(vehicle.status)}
        </span>

        <div class="open-link">Öffnen →</div>
      </article>
    `).join("") || '<div class="empty-state">Keine Fahrzeuge gefunden.</div>';
}

async function init(){
  updateClock();

  currentUser = await requireLogin();

  if (!currentUser) return;

  await hydrateTopUser();
  await loadVehicles();
}

init();
</script>

</body>
</html>
