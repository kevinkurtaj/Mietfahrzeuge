<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugübersicht</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #2563eb;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --card: #1e2937;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #334155;
  --primary: #3b82f6;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:var(--bg); color:var(--text); min-height:100vh; }

.topbar {
  background:var(--card); padding:0 32px; height:76px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
}

.sidebar {
  width:260px; background:var(--card); height:calc(100vh - 76px); border-right:1px solid var(--border); padding:24px 0; position:fixed;
}

.main {
  margin-left:260px; padding:32px;
}

.card {
  background:var(--card); border:1px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.vehicle-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:24px; margin-top:24px;
}

.vehicle-card {
  border:1px solid var(--border); border-radius:20px; padding:24px; cursor:pointer; transition:0.2s;
}

.vehicle-card:hover {
  transform:translateY(-8px); box-shadow:0 20px 40px rgba(37,99,235,0.15);
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div style="font-size:23px;font-weight:900;display:flex;align-items:center;gap:12px;color:var(--primary)">
    🚐 Inhofer Flottenmanagement
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <button onclick="toggleTheme()" style="background:none;border:1px solid var(--border);padding:8px 14px;border-radius:10px;cursor:pointer">🌗</button>
    <button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer">Logout</button>
  </div>
</div>

<div style="display:flex">
  <!-- Sidebar -->
  <div class="sidebar">
    <div style="padding:0 20px">
      <div style="padding:12px 16px;background:var(--primary);color:white;border-radius:12px;margin-bottom:8px;">🚘 Fahrzeuge</div>
      <div onclick="location.href='history.html'" style="padding:12px 16px;border-radius:12px;cursor:pointer;margin-bottom:8px;">🕒 Historie</div>
      <div onclick="location.href='admin.html'" style="padding:12px 16px;border-radius:12px;cursor:pointer;">👤 Admin Panel</div>
    </div>
  </div>

  <!-- Inhalt -->
  <div class="main">
    <h1>Fahrzeugübersicht</h1>
    <div id="vehicleList" class="vehicle-grid"></div>
  </div>
</div>

<script>
const db = window.supabase.createClient("https://iufkwovepjljycdulnwa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY");

function toggleTheme() {
  const isDark = document.body.getAttribute("data-theme") === "dark";
  const newTheme = isDark ? "light" : "dark";
  document.body.setAttribute("data-theme", newTheme);
  localStorage.setItem("theme", newTheme);
}

async function logout() {
  await db.auth.signOut();
  location.href = "login.html";
}

async function loadVehicles() {
  const {data: vehicles, error} = await db.from("vehicles").select("*").order("id");
  
  if (error) {
    console.error(error);
    return;
  }

  const container = document.getElementById("vehicleList");
  container.innerHTML = vehicles.map(v => `
    <div class="card vehicle-card" onclick="location.href='vehicle.html?id=${v.id}'">
      <strong style="font-size:18px">${v.name || 'Unbekanntes Fahrzeug'}</strong>
      <p style="color:var(--muted);margin:8px 0">${v.kennzeichen || 'Kein Kennzeichen'}</p>
      <span style="background:#dcfce7;color:#166534;padding:4px 12px;border-radius:999px;font-size:13px">
        ${v.status === 'einsatzbereit' ? 'Einsatzbereit' : v.status}
      </span>
    </div>
  `).join("");
}

// Theme laden
if (localStorage.getItem("theme") === "dark") document.body.setAttribute("data-theme", "dark");

loadVehicles();
</script>
</body>
</html>
