<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Schadendokumentation</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
* { box-sizing: border-box; font-family: Inter, Arial, sans-serif; }
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #f8fafc, #eef2ff);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0f172a;
  padding: 20px;
}

.login-page {
  width: 100%;
  max-width: 1180px;
  background: white;
  border-radius: 32px;
  box-shadow: 0 30px 90px rgba(15,23,42,.12);
  overflow: hidden;
  display: grid;
  grid-template-columns: 1.1fr .9fr;
}

.brand-side {
  padding: 56px;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 22px;
  font-weight: 900;
}

.form-side {
  padding: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  width: 100%;
  max-width: 390px;
}

h2 { font-size: 32px; margin: 0 0 8px 0; }
.sub { color: #64748b; margin-bottom: 26px; }

label {
  display: block;
  font-size: 13px;
  font-weight: 800;
  margin: 16px 0 8px;
}

input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #cbd5e1;
  border-radius: 14px;
  font-size: 15px;
}

input:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37,99,235,.12);
}

button {
  width: 100%;
  margin-top: 24px;
  padding: 15px;
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  border: none;
  border-radius: 14px;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  transform: translateY(-1px);
}

.msg {
  margin-top: 16px;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  display: none;
}

.msg.error { display: block; background: #fee2e2; color: #991b1b; }
.msg.success { display: block; background: #dcfce7; color: #166534; }

@media (max-width: 850px) {
  .login-page { grid-template-columns: 1fr; }
  .brand-side { padding: 40px; }
  .form-side { padding: 40px; }
}
</style>
</head>
<body>

<div class="login-page">

  <!-- Linke Seite -->
  <section class="brand-side">
    <div class="logo">
      <div style="font-size:32px">🚐</div>
      <div>Schadendokumentation</div>
    </div>
    <div>
      <h1 style="font-size:42px;line-height:1.1;margin:0 0 16px 0">Mietfahrzeuge sauber dokumentieren.</h1>
      <p style="opacity:0.9">Schäden erfassen, Fahrzeugstatus prüfen und Aktivitäten nachvollziehen.</p>
    </div>
    <div style="font-size:13px;opacity:0.75">Möbel Inhofer GmbH & Co. KG</div>
  </section>

  <!-- Rechte Seite -->
  <section class="form-side">
    <div class="login-card">
      <h2>Anmelden</h2>
      <p class="sub">Mitarbeiter-Zugang</p>

      <label>E-Mail</label>
      <input id="email" type="email" placeholder="name@moebel-inhofer.de" autocomplete="email">

      <label>Passwort</label>
      <input id="password" type="password" placeholder="Passwort" autocomplete="current-password">

      <button onclick="login()">Einloggen</button>

      <div style="margin-top:16px;font-size:13px">
        <a href="#" onclick="sendReset()" style="color:#2563eb;text-decoration:none">Passwort vergessen?</a>
      </div>

      <div id="msg" class="msg"></div>
    </div>
  </section>

</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");

function showMsg(text, type = "error") {
  msg.className = `msg ${type}`;
  msg.textContent = text;
}

// Enter-Taste Support
emailInput.addEventListener("keydown", e => { if(e.key === "Enter") passwordInput.focus(); });
passwordInput.addEventListener("keydown", e => { if(e.key === "Enter") login(); });

async function login() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password) {
    showMsg("Bitte E-Mail und Passwort eingeben.");
    return;
  }

  showMsg("Anmeldung läuft...", "success");

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    showMsg("Login fehlgeschlagen. Zugangsdaten prüfen.");
    return;
  }

  // Mitarbeiter-Daten holen
  const { data: employee } = await db
    .from("employees")
    .select("role")
    .eq("email", email)
    .maybeSingle();

  if (!employee) {
    showMsg("Kein Mitarbeiterprofil gefunden.");
    return;
  }

  showMsg("Login erfolgreich – Weiterleitung...", "success");

  setTimeout(() => {
    if (employee.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }
  }, 800);
}

async function sendReset() {
  const email = emailInput.value.trim();
  if (!email) {
    showMsg("Bitte zuerst E-Mail eingeben.");
    return;
  }

  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/reset-password.html"
  });

  if (error) {
    showMsg(error.message);
  } else {
    showMsg("Reset-Link wurde gesendet.", "success");
  }
}

// Auto-Login Check
async function checkSession() {
  const { data } = await db.auth.getSession();
  if (data.session?.user) {
    const { data: emp } = await db.from("employees").select("role").eq("email", data.session.user.email).maybeSingle();
    if (emp?.role === "admin") location.href = "admin.html";
    else location.href = "index.html";
  }
}

checkSession();
</script>
</body>
</html>
