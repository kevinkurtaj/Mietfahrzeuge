<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort zurücksetzen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#111827;--muted:#64748b;--blue:#2563eb;--green:#166534;--red:#991b1b}
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--ink);background:radial-gradient(circle at top right,#2563eb,transparent 35%),linear-gradient(135deg,#020617,#172554)}
.card{max-width:500px;width:100%;background:rgba(255,255,255,.97);border-radius:24px;padding:30px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.logo{width:56px;height:56px;border-radius:16px;background:#111827;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px}
h1{margin:0 0 8px 0;font-size:30px}
.small{font-size:13px;color:var(--muted)}
.row{border:1px solid #e5e7eb;border-radius:12px;background:#f8fafc;padding:12px;margin:12px 0}
input{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.14)}
button{width:100%;padding:12px;border:none;border-radius:12px;background:#111827;color:#fff;font-weight:800;cursor:pointer;margin-top:8px}
.meter{height:9px;background:#e5e7eb;border-radius:999px;margin:4px 0}
.fill{height:100%;width:0;border-radius:999px;transition:.2s}
.success{background:#ecfdf5;color:var(--green);border:1px solid #bbf7d0;border-radius:10px;padding:12px;margin-top:10px;display:none}
.error{background:#fef2f2;color:var(--red);border:1px solid #fecaca;border-radius:10px;padding:12px;margin-top:10px;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h1>Passwort zurücksetzen</h1>
  <div class="small">Vergib ein neues Passwort für dein Konto.</div>

  <div id="userBox" class="row">Reset-Link wird geprüft ...</div>

  <label>Neues Passwort</label>
  <input id="pw1" type="password" placeholder="Neues Passwort">
  <div class="meter"><div id="strengthFill" class="fill"></div></div>
  <div id="strengthText" class="small">Passwortstärke: -</div>

  <label>Passwort wiederholen</label>
  <input id="pw2" type="password" placeholder="Passwort wiederholen">

  <button id="saveBtn" onclick="resetPassword()">Passwort speichern</button>
  <div id="msg" class="success"></div>
</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const userBox = document.getElementById("userBox");
const pw1 = document.getElementById("pw1");
const pw2 = document.getElementById("pw2");
const msg = document.getElementById("msg");
const saveBtn = document.getElementById("saveBtn");
const strengthFill = document.getElementById("strengthFill");
const strengthText = document.getElementById("strengthText");

let currentUser = null;

function esc(v){return String(v ?? "").replace(/[&<>\"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));}
function showMsg(text, ok=true){msg.className = ok ? "success" : "error"; msg.style.display = "block"; msg.textContent = text;}

function strength(pw){
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  if (!pw) {
    strengthFill.style.width = "0";
    strengthText.textContent = "Passwortstärke: -";
    return 0;
  }

  if (score <= 2) {
    strengthFill.style.width = "35%";
    strengthFill.style.background = "#dc2626";
    strengthText.textContent = "Passwortstärke: schwach";
  } else if (score <= 4) {
    strengthFill.style.width = "70%";
    strengthFill.style.background = "#f59e0b";
    strengthText.textContent = "Passwortstärke: mittel";
  } else {
    strengthFill.style.width = "100%";
    strengthFill.style.background = "#16a34a";
    strengthText.textContent = "Passwortstärke: stark";
  }

  return score;
}

async function log(status, details, email) {
  try {
    await db.from("password_reset_activity").insert([{ user_id: currentUser?.id || null, email, status, details }]);
  } catch (_) {}
}

async function establish(){
  const hashParams = new URLSearchParams((location.hash || "").replace(/^#/, ""));
  const queryParams = new URLSearchParams(location.search);

  const access_token = hashParams.get("access_token") || queryParams.get("access_token");
  const refresh_token = hashParams.get("refresh_token") || queryParams.get("refresh_token");

  if (access_token && refresh_token) {
    const { error } = await db.auth.setSession({ access_token, refresh_token });
    if (error) throw error;
    history.replaceState(null, "", location.pathname);
  }

  const { data, error } = await db.auth.getUser();
  if (error || !data.user) throw new Error("Ungültiger oder abgelaufener Link.");

  currentUser = data.user;
  userBox.innerHTML = `👤 Benutzer: <b>${esc(currentUser.email)}</b>`;
  await log("reset_page_opened", "Reset-Seite geöffnet", currentUser.email);
}

async function resetPassword(){
  if (!pw1.value || !pw2.value) return showMsg("Bitte beide Felder ausfüllen.", false);
  if (pw1.value !== pw2.value) return showMsg("Passwörter stimmen nicht überein.", false);
  if (strength(pw1.value) < 3) return showMsg("Bitte stärkeres Passwort wählen.", false);

  saveBtn.disabled = true;
  saveBtn.textContent = "Wird gespeichert ...";

  const { error } = await db.auth.updateUser({ password: pw1.value });
  if (error) {
    await log("reset_failed", error.message, currentUser?.email);
    saveBtn.disabled = false;
    saveBtn.textContent = "Passwort speichern";
    return showMsg(error.message, false);
  }

  await log("reset_success", "Passwort erfolgreich geändert", currentUser?.email);
  showMsg("Passwort geändert. Weiterleitung ...", true);

  setTimeout(async () => {
    await db.auth.signOut();
    location.href = "/Mietfahrzeuge/index.html";
  }, 2000);
}

pw1.addEventListener("input", () => strength(pw1.value));
pw1.addEventListener("keydown", e => { if (e.key === "Enter") resetPassword(); });
pw2.addEventListener("keydown", e => { if (e.key === "Enter") resetPassword(); });

establish().catch(err => {
  userBox.textContent = "❌ Reset-Link ungültig oder abgelaufen.";
  showMsg(err?.message || "Bitte neuen Reset-Link anfordern.", false);
  saveBtn.disabled = true;
});
</script>
</body>
</html>
