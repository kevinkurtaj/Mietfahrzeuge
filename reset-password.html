<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort zurücksetzen</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #2563eb 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #111827;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.96);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 28px;
  padding: 36px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.35);
}

.logo {
  width: 54px;
  height: 54px;
  border-radius: 16px;
  background: #111827;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 28px;
}

.subtitle {
  margin: 8px 0 24px;
  color: #6b7280;
  line-height: 1.4;
  font-size: 14px;
}

label {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 6px;
  display: block;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 14px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  font-size: 15px;
  outline: none;
}

input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.16);
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  background: #111827;
  color: white;
  border-radius: 14px;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  margin-top: 4px;
}

button:hover {
  background: #1f2937;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.msg {
  margin-top: 14px;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  display: none;
}

.error {
  background: #fef2f2;
  color: #991b1b;
  border: 1px solid #fecaca;
}

.success {
  background: #ecfdf5;
  color: #166534;
  border: 1px solid #bbf7d0;
}

.note {
  margin-top: 18px;
  font-size: 12px;
  color: #6b7280;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">🔐</div>

  <h1>Passwort zurücksetzen</h1>
  <div class="subtitle">
    Bitte vergib ein neues Passwort für deinen Zugang zur Schadendokumentation.
  </div>

  <label>Neues Passwort</label>
  <input type="password" id="pw1" placeholder="Mindestens 6 Zeichen">

  <label>Passwort wiederholen</label>
  <input type="password" id="pw2" placeholder="Passwort erneut eingeben">

  <button id="saveBtn" onclick="resetPassword()">Passwort speichern</button>

  <div id="msg" class="msg"></div>

  <div class="note">
    Nach erfolgreicher Änderung wirst du automatisch weitergeleitet.
  </div>
</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const saveBtn = document.getElementById("saveBtn");

function showMessage(text, type) {
  msg.textContent = text;
  msg.className = "msg " + type;
  msg.style.display = "block";
}

async function resetPassword() {
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;

  msg.style.display = "none";

  if (!pw1 || !pw2) {
    showMessage("Bitte beide Passwortfelder ausfüllen.", "error");
    return;
  }

  if (pw1.length < 6) {
    showMessage("Das Passwort muss mindestens 6 Zeichen haben.", "error");
    return;
  }

  if (pw1 !== pw2) {
    showMessage("Die Passwörter stimmen nicht überein.", "error");
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = "Wird gespeichert ...";

  const { error } = await supabaseClient.auth.updateUser({
    password: pw1
  });

  if (error) {
    saveBtn.disabled = false;
    saveBtn.textContent = "Passwort speichern";
    showMessage("Fehler: " + error.message, "error");
    return;
  }

  showMessage("Passwort erfolgreich geändert. Weiterleitung in 3 Sekunden ...", "success");

  setTimeout(() => {
    window.location.href = "index.html";
  }, 3000);
}
</script>

</body>
</html>
